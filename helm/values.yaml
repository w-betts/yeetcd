local: false

# RustFS - S3-compatible object storage for pipeline input/output files
# Deployed in standalone mode (1 pod) for simplicity
rustfs:
  enabled: true
  mode:
    standalone:
      enabled: true
    distributed:
      enabled: false
  # Storage class for RustFS data and logs PVCs
  # k3d uses 'local-path' as the default storage class
  storageclass:
    name: local-path
    dataStorageSize: 10Gi
    logStorageSize: 1Gi
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# k8s-csi-s3 - CSI driver that exposes S3 buckets as Kubernetes PVCs
# Configured to use the in-cluster RustFS instance
csi-s3:
  enabled: true
  storageClass:
    # Name of the StorageClass to create
    name: "yeetcd-s3"
    # Use GeeseFS for ReadWriteMany support
    mounter: geesefs
    # S3 endpoint - points to in-cluster RustFS service
    endpoint: "http://yeetcd-rustfs-svc:9000"
    # Region (can be any value for RustFS)
    region: "us-east-1"
    # Bucket prefix for PVCs
    bucketPrefix: "yeetcd-pipeline"
    # Reclaim policy
    reclaimPolicy: Delete
    # Volume binding mode
    volumeBindingMode: Immediate
  # S3 credentials for RustFS
  secret:
    # Create the secret with these credentials
    create: true
    name: "rustfs-credentials"
    # RustFS default credentials
    accessKey: "rustfsadmin"
    secretKey: "rustfsadmin"
    # Endpoint pointing to in-cluster RustFS service
    endpoint: "http://yeetcd-rustfs-svc:9000"