version: 2
problem_statement: "Add mock execution engine support to the yeetcd CLI and create a new test SDK that enables users to define mock behaviors, verify expectations, and run pipelines against a mock execution engine instead of real Docker containers."
goals:
  - "Add --mock-execution-engine-address flag to CLI run command that switches from Docker to gRPC-based mock execution"
  - "CLI auto-detects compiled classes exist and skips build step"
  - "CLI accepts classpath to run pipeline generator and custom work"
  - "Create protobuf definitions for mock execution engine communication (work parameters and responses)"
  - "Implement gRPC client in CLI for mock execution engine communication"
  - "Create new yeetcd:test SDK that allows users to define mock behaviors and verify expectations"
  - "Bundle CLI binaries for multiple platforms (darwin/amd64, darwin/arm64, linux/amd64, linux/arm64) in the test SDK uber JAR"
  - "Replace existing java-test module with yeetcd:test"
constraints:
  - "The mock execution engine must use gRPC with new protobuf messages (different from pipeline proto)"
  - "The CLI binaries bundled in the test SDK must be the genuine yeetcd binaries (not GraalVM)"
  - "The test SDK should NOT depend on yeetcd:sdk - works independently with classpath"
  - "All platform-specific binaries must be bundled in the uber JAR and platform detected at runtime"
tech_choices:
  - area: "grpc"
    choice: "gRPC with Protobuf"
    rationale: "Reuse existing gRPC infrastructure; new proto needed for mock execution work parameters"
  - area: "maven"
    choice: "Maven shade plugin for uber JAR"
    rationale: "Need to bundle platform-specific CLI binaries in test SDK JAR"
  - area: "naming"
    choice: "yeetcd:test"
    rationale: "Replace java-test module with new test module using yeetcd group ID"
  - area: "classpath"
    choice: "CLI accepts classpath and uses it to run pipeline generator + custom work"
    rationale: "Test SDK provides compiled classes; CLI skips build and runs directly"
  - area: "auto-detect"
    choice: "CLI auto-detects compiled classes exist and skips build"
    rationale: "Works with test SDK without requiring --no-build flag"
architecture:
  description: "Mock execution engine architecture with CLI integration and test SDK"
  components:
    - name: "MockExecutionEngine (Go)"
      responsibility: "gRPC client that sends work parameters to mock server instead of running Docker containers"
      interfaces: ["RunJob(ctx, JobDefinition) -> *JobResult", "BuildImage(ctx, BuildImageDefinition) -> *BuildImageResult"]
    - name: "MockExecutionProto (Proto)"
      responsibility: "Define protobuf messages for mock execution engine communication"
      interfaces: ["MockWorkRequest", "MockWorkResponse", "MockImageBuildRequest", "MockImageBuildResponse"]
    - name: "TestRunner (Java)"
      responsibility: "Enable users to define mock behaviors, verify expectations, and run CLI with mock engine"
      interfaces: ["YeetcdMockRunner.builder()", "defineBehavior()", "verifyExpectations()", "runCLI()"]
    - name: "CLIBundler (Java)"
      responsibility: "Bundle CLI binaries for multiple platforms in uber JAR and detect platform at runtime"
      interfaces: ["getPlatformBinary()", "spawnSubprocess()"]
test_strategy:
  approach: "Unit tests for new components, integration tests for CLI-to-mock communication"
  test_patterns:
    - language: "go"
      pattern: "*_test.go"
    - language: "java"
      pattern: "*Test.java"
phases:
  - name: "Phase 1: Create mock execution protobuf definitions"
    description: "Define protobuf messages for mock execution engine communication and add gRPC support"
    status: "in_progress"
    is_release_boundary: false
    file_changes:
      - action: "modify"
        description: "Add grpc-go and protoc-gen-go dependencies to go.mod"
        is_test: false
        path: "golang/go.mod"
      - action: "create"
        description: "Create mock.proto with MockWorkRequest, MockWorkResponse, MockImageBuildRequest, MockImageBuildResponse and MockExecutionService gRPC service"
        is_test: false
        path: "golang/protocol/src/main/proto/yeetcd/protocol/mock/mock.proto"
      - action: "create"
        description: "Generate Go code from mock.proto (MockExecutionService client/server)"
        is_test: false
        path: "golang/internal/core/proto/mock/mock.pb.go"
      - action: "create"
        description: "Unit tests for mock protobuf serialization/deserialization"
        is_test: true
        path: "golang/internal/core/proto/mock/mock_test.go"
    test_cases:
      - description: "Verify MockWorkRequest contains all job parameters (image, cmd, env vars, working dir, input/output paths)"
        type: "unit"
        target_component: "MockExecutionProto"
        contracts: ["MockWorkRequest serialization", "MockWorkRequest deserialization"]
        given_when_then: |
          GIVEN: a JobDefinition with all fields populated
          WHEN: converting to MockWorkRequest
          THEN: all fields are correctly mapped to proto fields
      - description: "Verify MockWorkResponse correctly returns exit code and output paths"
        type: "unit"
        target_component: "MockExecutionProto"
        contracts: ["MockWorkResponse serialization", "MockWorkResponse deserialization"]
        given_when_then: |
          GIVEN: a job execution result with exit code and outputs
          WHEN: creating MockWorkResponse
          THEN: response correctly maps to protobuf fields
      - description: "Verify MockImageBuildRequest contains all build parameters"
        type: "unit"
        target_component: "MockExecutionProto"
        contracts: ["MockImageBuildRequest serialization"]
        given_when_then: |
          GIVEN: a BuildImageDefinition with image, tag, artifacts
          WHEN: converting to MockImageBuildRequest
          THEN: all parameters are correctly mapped
      - description: "Verify MockExecutionService gRPC service compiles"
        type: "unit"
        target_component: "MockExecutionProto"
        contracts: ["MockExecutionService.RunWork", "MockExecutionService.BuildImage"]
        given_when_then: |
          GIVEN: the mock.proto file
          WHEN: generating gRPC code
          THEN: service compiles without errors
  - name: "Phase 2: Add mock execution engine to CLI"
    description: "Add --mock-execution-engine-address flag and implement gRPC client, auto-detect skip build"
    status: "pending"
    is_release_boundary: true
    file_changes:
      - action: "modify"
        description: "Add --mock-execution-engine-address flag to run command"
        is_test: false
        path: "golang/cmd/yeetcd/run.go"
      - action: "create"
        description: "Create mock execution engine implementation"
        is_test: false
        path: "golang/pkg/engine/mock/mock_execution_engine.go"
      - action: "modify"
        description: "Add classpath handling to run command"
        is_test: false
        path: "golang/cmd/yeetcd/run.go"
    test_cases:
      - description: "CLI accepts --mock-execution-engine-address and uses mock engine instead of Docker"
        type: "unit"
        target_component: "CLIRunCommand"
        contracts: ["runCmd with mock address uses MockExecutionEngine"]
        given_when_then: |
          GIVEN: run command with --mock-execution-engine-address
          WHEN: executing pipeline
          THEN: uses MockExecutionEngine not DockerExecutionEngine
      - description: "CLI auto-detects compiled classes and skips build"
        type: "unit"
        target_component: "CLIRunCommand"
        contracts: ["runCmd auto-detects classes and skips build"]
        given_when_then: |
          GIVEN: source with pre-compiled classes in artifact paths
          WHEN: running pipeline
          THEN: build step is skipped
  - name: "Phase 3: Create yeetcd:test module structure"
    description: "Create new test module replacing java-test with mock runner API"
    status: "in_progress"
    is_release_boundary: false
    file_changes:
      - action: "modify"
        description: "Update test module pom.xml: add grpc, proto-java dependencies for MockServer; remove yeetcd:sdk dependency per spec requirements"
        is_test: false
        path: "sdks/java/test/pom.xml"
      - action: "create"
        description: "Create MockServer.java - implements gRPC MockExecutionService, runs embedded in test JVM, accepts behavior definitions and returns mock responses"
        is_test: false
        path: "sdks/java/test/src/main/java/yeetcd/test/MockServer.java"
    test_cases:
      - description: "MockServer starts embedded gRPC server and can register mock behaviors"
        type: "unit"
        target_component: "MockServer"
        contracts: ["MockServer.start()", "MockServer.stop()", "MockServer.registerBehavior()", "MockExecutionServiceGrpc.MockExecutionServiceImplBase"]
        given_when_then: |
          GIVEN: a MockServer instance
          WHEN: start() is called and behaviors are registered
          THEN: gRPC server accepts connections and responds to RunWork requests with registered behaviors
      - description: "MockServer tracks work executions for expectation verification"
        type: "unit"
        target_component: "MockServer"
        contracts: ["MockServer.registerBehavior()", "MockServer.getExecutedWork()"]
        given_when_then: |
          GIVEN: MockServer with registered behaviors
          WHEN: work is executed through mock engine
          THEN: executions are tracked and can be retrieved for verification
      - description: "MockServer correctly parses MockWorkRequest proto and returns MockWorkResponse"
        type: "unit"
        target_component: "MockServer"
        contracts: ["MockWorkRequest deserialization", "MockServer.onRunWork()"]
        given_when_then: |
          GIVEN: a MockWorkRequest with image, cmd, env vars
          WHEN: request is received by MockServer
          THEN: request is parsed and matched against registered behaviors to return appropriate response
  - name: "Phase 4: Bundle CLI binaries in test SDK"
    description: "Configure maven-shade-plugin to include platform-specific CLI binaries and detect platform at runtime"
    status: "pending"
    is_release_boundary: false
    file_changes:
      - action: "modify"
        description: "Add maven-shade-plugin to test pom.xml with resource transformers to include CLI binaries from src/main/resources/cli/ directory into uber JAR, maintaining directory structure. Also add grpc-netty-shaded and grpc-protobuf dependencies required for gRPC communication in test SDK."
        is_test: false
        path: "sdks/java/test/pom.xml"
      - action: "create"
        description: "Create PlatformDetector utility class that detects OS (darwin/linux) and architecture (amd64/arm64) at runtime using System.getProperties. Returns a normalized platform string like 'darwin-amd64' or 'linux-arm64' used to select the correct CLI binary from bundled resources."
        is_test: false
        path: "sdks/java/test/src/main/java/yeetcd/test/PlatformDetector.java"
    test_cases:
      - description: "PlatformDetector correctly detects operating system (darwin vs linux) using System.getProperty('os.name')"
        type: "unit"
        target_component: "PlatformDetector"
        contracts: ["PlatformDetector.getOS()", "PlatformDetector.getArch()", "PlatformDetector.getPlatform()"]
        given_when_then: |
          GIVEN: JVM running on Linux
          WHEN: PlatformDetector.getOS() is called
          THEN: returns 'linux'
          GIVEN: JVM running on macOS
          WHEN: PlatformDetector.getOS() is called
          THEN: returns 'darwin'
      - description: "PlatformDetector correctly detects CPU architecture (amd64 vs arm64) using System.getProperty('os.arch')"
        type: "unit"
        target_component: "PlatformDetector"
        contracts: ["PlatformDetector.getArch()"]
        given_when_then: |
          GIVEN: JVM running on x86_64
          WHEN: PlatformDetector.getArch() is called
          THEN: returns 'amd64'
          GIVEN: JVM running on aarch64
          WHEN: PlatformDetector.getArch() is called
          THEN: returns 'arm64'
      - description: "PlatformDetector returns combined platform string (e.g., 'darwin-arm64', 'linux-amd64') for binary lookup"
        type: "unit"
        target_component: "PlatformDetector"
        contracts: ["PlatformDetector.getPlatform()"]
        given_when_then: |
          GIVEN: JVM on macOS ARM (Apple Silicon)
          WHEN: PlatformDetector.getPlatform() is called
          THEN: returns 'darwin-arm64'
          GIVEN: JVM on Linux x86_64
          WHEN: PlatformDetector.getPlatform() is called
          THEN: returns 'linux-amd64'
  - name: "Phase 5: Implement test SDK mock behavior and verification APIs"
    description: "Implement YeetcdMockRunner that allows defining behaviors and verifying expectations"
    status: "in_progress"
    is_release_boundary: false
    file_changes:
      - action: "create"
        description: "Create YeetcdMockRunner main class that orchestrates mock server lifecycle, behavior registration, CLI spawning, and expectation verification. Provides builder pattern with methods: startMockServer(), defineBehavior(), runCLI(), verifyExpectations()."
        is_test: false
        path: "sdks/java/test/src/main/java/yeetcd/test/YeetcdMockRunner.java"
      - action: "create"
        description: "Create MockBehavior DSL for defining mock responses. Supports matching work by image, command, env vars. Returns configured responses (exitCode, stdout, stderr). Uses builder pattern."
        is_test: false
        path: "sdks/java/test/src/main/java/yeetcd/test/MockBehavior.java"
      - action: "create"
        description: "Create WorkExecution record to capture work execution details from mock server (image, cmd, env vars, exit code, stdout). Used for expectation verification."
        is_test: false
        path: "sdks/java/test/src/main/java/yeetcd/test/WorkExecution.java"
      - action: "create"
        description: "Create ExpectationVerifier for verifying work executions match expected behaviors. Provides methods: assertExecuted(), assertExecutedCount(), assertNotExecuted(), getExecutedWork()."
        is_test: false
        path: "sdks/java/test/src/main/java/yeetcd/test/ExpectationVerifier.java"
      - action: "create"
        description: "Create CLISpawner to run CLI with classpath and mock server address. Detects platform-specific CLI binary from classpath resources, spawns subprocess with YEETCD_MOCK_ADDRESS env var."
        is_test: false
        path: "sdks/java/test/src/main/java/yeetcd/test/CLISpawner.java"
    test_cases:
      - description: "YeetcdMockRunner orchestrates mock server lifecycle, behavior registration, CLI execution, and expectation verification"
        type: "unit"
        target_component: "YeetcdMockRunner"
        contracts: ["YeetcdMockRunner.builder()", "YeetcdMockRunner.startMockServer()", "YeetcdMockRunner.defineBehavior()", "YeetcdMockRunner.runCLI()", "YeetcdMockRunner.verifyExpectations()"]
        given_when_then: |
          GIVEN: YeetcdMockRunner with behaviors defined
          WHEN: startMockServer() starts embedded server, runCLI() spawns CLI with mock address, verifyExpectations() checks executions
          THEN: CLI connects to mock server, mock returns defined behaviors, expectations can be verified
      - description: "MockBehavior DSL allows defining mock responses matched by work parameters"
        type: "unit"
        target_component: "MockBehavior"
        contracts: ["MockBehavior.matching()", "MockBehavior.exitCode()", "MockBehavior.stdout()", "MockBehaviorBuilder.build()"]
        given_when_then: |
          GIVEN: MockBehavior with matching criteria (image='nginx', cmd=['echo hello'])
          WHEN: mock server receives work matching criteria
          THEN: returns configured exitCode=0, stdout='hello'
      - description: "WorkExecution captures raw work execution parameters from mock server for verification"
        type: "unit"
        target_component: "WorkExecution"
        contracts: ["WorkExecution.getImage()", "WorkExecution.getCmd()", "WorkExecution.getEnvVars()", "WorkExecution.getExitCode()", "WorkExecution.getStdOut()"]
        given_when_then: |
          GIVEN: work executed through mock server
          WHEN: mock server records execution
          THEN: WorkExecution contains image, cmd, env vars, exit code, stdout
      - description: "ExpectationVerifier verifies work executions match expected behaviors"
        type: "unit"
        target_component: "ExpectationVerifier"
        contracts: ["ExpectationVerifier.assertExecuted()", "ExpectationVerifier.assertExecutedCount()", "ExpectationVerifier.assertNotExecuted()", "ExpectationVerifier.getExecutedWork()"]
        given_when_then: |
          GIVEN: executions tracked by mock server
          WHEN: verify expectations with matching criteria
          THEN: assertions pass if executions match criteria
      - description: "CLISpawner runs CLI binary with classpath and mock server address environment variable"
        type: "unit"
        target_component: "CLISpawner"
        contracts: ["CLISpawner.spawn()", "CLISpawner.getPlatformBinary()", "CLISpawner.withClasspath()", "CLISpawner.withMockAddress()"]
        given_when_then: |
          GIVEN: CLISpawner with classpath and mock server address
          WHEN: spawn() is called
          THEN: CLI binary is extracted for platform, subprocess is started with YEETCD_MOCK_ADDRESS env var
  - name: "Phase 6: Remove old java-test module"
    description: "Remove the existing java-test module and update parent pom.xml"
    status: "in_progress"
    is_release_boundary: false
    file_changes:
      - action: "modify"
        description: "Update test module pom.xml: remove yeetcd:sdk dependency (per spec constraint - test SDK works independently with classpath), ensure grpc-netty-shaded and grpc-protobuf dependencies exist for MockServer communication, ensure mock proto-java generated classes are available"
        is_test: false
        path: "sdks/java/test/pom.xml"
      - action: "create"
        description: "Create YeetcdMockRunnerTest.java - unit tests for YeetcdMockRunner including mock server lifecycle, behavior registration, and expectation verification"
        is_test: true
        path: "sdks/java/test/src/test/java/yeetcd/test/YeetcdMockRunnerTest.java"
      - action: "create"
        description: "Create MockBehaviorTest.java - unit tests for MockBehavior DSL including matching logic and response configuration"
        is_test: true
        path: "sdks/java/test/src/test/java/yeetcd/test/MockBehaviorTest.java"
      - action: "create"
        description: "Create ExpectationVerifierTest.java - unit tests for ExpectationVerifier including assertExecuted, assertExecutedCount, assertNotExecuted"
        is_test: true
        path: "sdks/java/test/src/test/java/yeetcd/test/ExpectationVerifierTest.java"
      - action: "create"
        description: "Create CLISpawnerTest.java - unit tests for CLISpawner including platform detection, binary extraction, and process spawning"
        is_test: true
        path: "sdks/java/test/src/test/java/yeetcd/test/CLISpawnerTest.java"
    test_cases:
      - description: "YeetcdMockRunner integrates with embedded MockServer, registers behaviors, spawns CLI, and verifies expectations"
        type: "unit"
        target_component: "YeetcdMockRunner"
        contracts: ["YeetcdMockRunner.builder()", "YeetcdMockRunner.startMockServer()", "YeetcdMockRunner.defineBehavior()", "YeetcdMockRunner.runCLI()", "YeetcdMockRunner.verifyExpectations()"]
        given_when_then: |
          GIVEN: YeetcdMockRunner with defined behaviors
          WHEN: startMockServer() starts embedded gRPC server, CLI is spawned with mock address
          THEN: CLI connects to mock server and returns expected results
      - description: "MockBehavior correctly matches work by image, command, and environment variables"
        type: "unit"
        target_component: "MockBehavior"
        contracts: ["MockBehavior.matching()", "MockBehavior.exitCode()", "MockBehavior.stdout()"]
        given_when_then: |
          GIVEN: MockBehavior with image='nginx' and cmd=['echo hello']
          WHEN: work is executed with matching image and cmd
          THEN: returns configured exitCode=0 and stdout='hello'
      - description: "ExpectationVerifier correctly asserts work was executed, executed N times, or not executed"
        type: "unit"
        target_component: "ExpectationVerifier"
        contracts: ["ExpectationVerifier.assertExecuted()", "ExpectationVerifier.assertExecutedCount()", "ExpectationVerifier.assertNotExecuted()"]
        given_when_then: |
          GIVEN: WorkExecution records from mock server
          WHEN: verify expectations with matching criteria
          THEN: assertions pass/fail correctly based on execution history
      - description: "CLISpawner extracts correct platform binary and spawns CLI with mock address"
        type: "unit"
        target_component: "CLISpawner"
        contracts: ["CLISpawner.getPlatformBinary()", "CLISpawner.spawn()"]
        given_when_then: |
          GIVEN: PlatformDetector returns 'darwin-arm64'
          WHEN: CLISpawner.spawn() is called
          THEN: extracts yeetcd-darwin-arm64 binary and starts process with YEETCD_MOCK_ADDRESS env var

addressed_issues:
