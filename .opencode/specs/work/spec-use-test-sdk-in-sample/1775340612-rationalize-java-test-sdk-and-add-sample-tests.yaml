architecture:
  components:
    - interfaces:
        - "startMockServer()"
        - "defineBehavior()"
        - "runCLI()"
        - "verifyExpectations()"
      name: "YeetcdMockRunner"
      responsibility: "Main entry point orchestrating mock server lifecycle, behavior registration, CLI spawning, and expectation verification"
    - interfaces:
        - "start()"
        - "stop()"
        - "registerBehavior()"
        - "getExecutedWork()"
      name: "MockServer"
      responsibility: "Embedded gRPC server implementing MockExecutionService for intercepting work execution"
    - interfaces:
        - "spawn()"
      name: "CLISpawner"
      responsibility: "Spawns yeetcd binary with mock server address configured via environment variable"
    - interfaces:
        - "getOS()"
        - "getArch()"
        - "getPlatform()"
        - "getBinaryName()"
      name: "PlatformDetector"
      responsibility: "Runtime detection of OS and architecture for selecting correct binary"
    - interfaces:
        - "matches()"
      name: "FakeWorkMatcher"
      responsibility: "Matches work executions to behavior definitions"
    - interfaces:
        - "verify()"
      name: "ExpectationVerifier"
      responsibility: "Verifies recorded executions match expected behaviors"
  description: "Java Test SDK using embedded mock gRPC server with spawned yeetcd binary. The test SDK bundles platform-specific yeetcd binaries, auto-detects the current OS, spawns the binary with YEETCD_MOCK_ADDRESS environment variable, allowing users to define mock behaviors and verify execution sequences."
constraints:
  - "Must build yeetcd before Java SDKs to avoid circular dependency"
  - "Binary must be executable and bundled in test JAR"
  - "Mock server runs embedded in test JVM"
  - "Tests in java-sample must use the test SDK"
goals:
  - "Remove FakePipelineRunner completely from java-test module"
  - "Bundle yeetcd binaries for darwin-amd64, darwin-arm64, linux-amd64, linux-arm64 in test JAR"
  - "Auto-detect OS and run appropriate binary with mock server address"
  - "Add tests to java-sample using the test SDK"
  - "Configure build order: build yeetcd → build protocol → build sdk → build test → build sample → test"
