tech_choices:
  - area: "spec_file_format"
    choice: "YAML"
    rationale: "User requested YAML for the recursive spec file"
  - area: "spec_file_location"
    choice: "spectree/ directory at project root"
    rationale: "User requested top-level directory, not nested under .opencode"
  - area: "agent_id_storage"
    choice: "File-based (agent writes to .opencode/agent_id)"
    rationale: "User requested reading agent ID from file"
  - area: "implementation_order"
    choice: "Depth-first (left-to-right)"
    rationale: "User specified depth-first with left-most leaf first, order determined by children array"
  - area: "spec_tool_family"
    choice: "New spectree_* tools"
    rationale: "User requested new tool family, not extending existing spec tools"
