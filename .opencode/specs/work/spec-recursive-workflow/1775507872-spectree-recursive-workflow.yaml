    - interfaces:
        - "./agent spectree"
      name: "agent_entry"
      responsibility: "New entry point in agent wrapper script"
    - interfaces:
        - "spectree.md"
      name: "agent_prompt"
      responsibility: "Primary agent prompt for spectree workflow"
    - interfaces:
        - "subagent"
      name: "node_agent"
      responsibility: "Spawned for each sub-problem node"
    - interfaces:
        - "test-writer"
      name: "test_writer_agent"
      responsibility: "Writes tests for a leaf node"
    - interfaces:
        - "implementer"
      responsibility: "Implements code for a leaf node"
      name: "implementer_agent"
    - interfaces:
        - "reviewer"
      responsibility: "Adversarial review of leaf implementation"
      name: "reviewer_agent"
  description: "Spectree is a recursive problem decomposition workflow that breaks down problems by spawning subagents. Each node in the spec tree represents a sub-problem. The workflow explores problems breadth-first, records all decisions in a recursive YAML spec, and implements leaves in depth-first order."
constraints:
  - "Agent can only edit its own node in the spec - enforced by tool"
  - "Breadth-first exploration at each level - all branches at level N must be explored before going deeper"
  - "Leaves implemented in depth-first order (left-to-right)"
  - "Each leaf requires: test strategy, test cases with user feedback, implementation details, code review"
  - "Commits happen after each leaf's tests pass and code review passes"
  - "Merge to main happens after all leaves complete"
  - "No release boundaries in this workflow"
goals:
  - "Create new ./agent spectree entry point"
  - "Create spectree tool family for recursive spec management"
  - "Implement recursive spec file structure in YAML"
  - "Implement breadth-first problem exploration with user interaction"
  - "Implement leaf-level test strategy and test case definition"
  - "Implement leaf-level implementation with code review"
  - "Implement depth-first leaf implementation order"
  - "Implement per-leaf commit and final merge"
