# Spec: kubernetes-execution-engine
# Generated: 2026-03-28T22:00:00.000Z
# Migrated from flat spec structure for new worktree-based workflow

version: 2
problem_statement: "The KubernetesExecutionEngine exists but is incomplete - tests are disabled and it lacks support for input/output files. The current implementation cannot mount host directories into pods (since controller runs in Kubernetes) and has no mechanism for file transfer between work items. Additionally, the test infrastructure relies on bash scripts (local-k8s.sh) which should be replaced with Java-based test utilities."
goals:
  - "Enable KubernetesExecutionEngine tests by implementing missing functionality"
  - "Support input/output files using in-cluster storage (k8s-csi-s3 + RustFS with shared PVC per pipeline)"
  - "Replace bash-based test infrastructure with Java test utilities"
  - "Implement removeImage() functionality for cleanup"
  - "Ensure tests are developer-friendly: create cluster if missing, clean up only test resources, auto-fix bad state"
constraints:
  - "Controller runs inside Kubernetes (not outside)"
  - "Use RustFS (Apache 2.0 license) as in-cluster S3-compatible object store"
  - "Use k8s-csi-s3 (Apache 2.0 license) CSI driver to expose S3 buckets as PVCs"
  - "Single tenant initially (multi-tenancy deferred)"
  - "Tests must pass the 5 tests in AbstractExecutionEngineTest"
  - "Remove local-k8s.sh bash scripts entirely"
  - "Shared PVC per pipeline - each work item writes to its own subdirectory"
  - "GeeseFS (used by k8s-csi-s3) supports ReadWriteMany for concurrent pod access"
tech_choices:
  - area: "Object Storage"
    choice: "RustFS"
    rationale: "Apache 2.0 license (permissive), simple Helm deployment, S3-compatible API, lightweight (1 pod in standalone mode)"
  - area: "CSI Driver"
    choice: "k8s-csi-s3"
    rationale: "Apache 2.0 license, exposes S3 buckets as PVCs using GeeseFS, supports ReadWriteMany (RWX) for concurrent pod access"
  - area: "Storage Architecture"
    choice: "Shared PVC per pipeline"
    rationale: "One PVC per pipeline, each work item writes to its own subdirectory (e.g., /mnt/pvc/outputs/work-a/), multiple pods can mount same PVC simultaneously, no file copying needed between work items"
  - area: "Test Infrastructure"
    choice: "Java-based with k3d"
    rationale: "Eliminates bash script dependency, better IDE integration, automatic cleanup of stale resources"
  - area: "Test Verification"
    choice: "S3 API directly"
    rationale: "Tests use S3 API to read RustFS and verify outputs - simpler and faster than mounting PVCs in test pods"
architecture:
  description: "The controller runs as a pod in Kubernetes. RustFS provides in-cluster S3-compatible storage. k8s-csi-s3 CSI driver exposes RustFS buckets as PVCs. Each pipeline gets a shared PVC - work items mount this PVC and write to their own subdirectories. Work B can read Work A's outputs directly from the shared PVC path. Tests use k3d for local Kubernetes, verify outputs via S3 API directly."
  components:
    - name: "RustFS Helm Chart"
      responsibility: "Provides in-cluster S3-compatible object storage"
      interfaces:
        - "S3 API endpoint"
        - "Helm values for configuration"
    - name: "k8s-csi-s3 Helm Chart"
      responsibility: "CSI driver that exposes S3 buckets as Kubernetes PVCs"
      interfaces:
        - "CSI provisioner"
        - "StorageClass for S3-backed PVCs"
    - name: "PipelinePvcManager"
      responsibility: "Creates/deletes PVCs for each pipeline run"
      interfaces:
        - "createPvc(pipelineRunId) -> pvcName"
        - "deletePvc(pvcName)"
    - name: "KubernetesExecutionEngine"
      responsibility: "Executes work items in Kubernetes pods, mounts shared PVC for input/output"
      interfaces:
        - "execute(work) -> result"
        - "removeImage(imageId)"
        - "configurePodWithPvc(podSpec, pvcName, workId)"
    - name: "TestInfrastructure"
      responsibility: "Manages k3d cluster lifecycle, test resource cleanup, stale resource detection"
      interfaces:
        - "ensureClusterExists()"
        - "cleanupTestResources()"
        - "cleanupStaleResources()"
test_strategy:
  approach: "Integration tests against real k3d cluster. Tests inherit from AbstractExecutionEngineTest which provides 5 core test cases. Tests verify outputs via S3 API directly (reading from RustFS). Additional tests for PVC lifecycle and cleanup logic."
  test_patterns:
    - language: "java"
      pattern: "*Test.java"
    - language: "java"
      pattern: "*IT.java"
phases:
  - name: "Phase 1: Helm Dependencies (RustFS + k8s-csi-s3)"
    description: "Add RustFS and k8s-csi-s3 as Helm dependencies to the yeetcd chart. Configure RustFS for standalone mode (1 pod). Configure k8s-csi-s3 StorageClass to use RustFS as the S3 backend. This phase is a release boundary because subsequent phases require these components to be deployed in the cluster before the controller can use PVC-based storage."
    status: "pending"
    is_release_boundary: true
    file_changes:
      - path: "helm/Chart.yaml"
        action: "modify"
        description: "Add RustFS and k8s-csi-s3 as Helm chart dependencies with appropriate version constraints"
        is_test: false
      - path: "helm/values.yaml"
        action: "modify"
        description: "Add configuration values for RustFS (standalone mode, single replica) and k8s-csi-s3 (StorageClass pointing to RustFS S3 endpoint)"
        is_test: false
    test_cases:
      - description: "Verify Helm chart dependencies are valid"
        type: "integration"
        target_component: "Helm Chart"
        contracts: ["helm dependency update", "helm template"]
        given_when_then: "GIVEN: Helm chart with RustFS and k8s-csi-s3 dependencies, WHEN: helm dependency update is run, THEN: dependencies are downloaded without errors"
      - description: "Verify StorageClass is created with correct S3 endpoint"
        type: "integration"
        target_component: "k8s-csi-s3 StorageClass"
        contracts: ["StorageClass"]
        given_when_then: "GIVEN: Helm chart is rendered, WHEN: template output is inspected, THEN: StorageClass for S3-backed PVCs references RustFS S3 endpoint"
  - name: "Phase 2: Test Infrastructure"
    description: "Create Java-based test infrastructure for k3d cluster management. Implement: (1) Cluster existence check and creation if missing, (2) Test resource cleanup (jobs/pods only, not cluster), (3) Stale resource cleanup from failed test runs, (4) Bad state detection and auto-fix. Remove local-k8s.sh bash scripts entirely. Test helpers are coded defensively and verified via integration tests rather than unit tests."
    status: "pending"
    is_release_boundary: false
    file_changes:
      - path: "local-k8s.sh"
        action: "delete"
        description: "Remove bash script entirely as per constraints"
        is_test: false
      - path: "controller/src/test/java/yeetcd/controller/testinfra/K3dClusterManager.java"
        action: "create"
        description: "Java class for k3d cluster lifecycle management: ensureClusterExists(), createClusterIfMissing(), getKubeconfig(), getRegistryPort(). Coded defensively with clear error messages."
        is_test: false
      - path: "controller/src/test/java/yeetcd/controller/testinfra/TestResourceCleaner.java"
        action: "create"
        description: "Java class for cleaning up test resources: cleanupTestResources(namespace), cleanupStaleResources(namespace, maxAge), cleanupJobsAndPods(namespace, labelSelector). Coded defensively."
        is_test: false
      - path: "controller/src/test/java/yeetcd/controller/testinfra/TestClusterFixture.java"
        action: "create"
        description: "JUnit 5 extension that integrates K3dClusterManager and TestResourceCleaner for use in tests. Handles beforeAll/afterAll lifecycle."
        is_test: false
      - path: "controller/pom.xml"
        action: "modify"
        description: "Add test dependencies: JUnit 5 extensions, Awaitility for async assertions"
        is_test: false
      - path: "controller/src/test/java/yeetcd/controller/execution/KubernetesExecutionEngineTest.java"
        action: "modify"
        description: "Update to use TestClusterFixture instead of bash-generated config files"
        is_test: true
    test_cases: []
  - name: "Phase 3: KubernetesExecutionEngine PVC Support"
    description: "Implement input/output file handling in KubernetesExecutionEngine using shared PVC per pipeline. Add PipelinePvcManager component for PVC lifecycle. Update work pod configuration to mount shared PVC with work-specific subdirectories. Implement removeImage() for cleanup. Enable the 5 tests in AbstractExecutionEngineTest. CRITICAL: MountInput interface may need changes to support PVC-based mounts vs Docker's local filesystem approach."
    status: "pending"
    is_release_boundary: false
    file_changes:
      - path: "controller/src/main/java/yeetcd/controller/execution/PipelinePvcManager.java"
        action: "create"
        description: "Manages PVC lifecycle for pipelines: createPvc(pipelineRunId, storageClassName), deletePvc(pvcName), getPvcStatus(pvcName)"
        is_test: false
      - path: "controller/src/main/java/yeetcd/controller/execution/PvcMountInput.java"
        action: "create"
        description: "MountInput implementation for PVC-based mounts: pvcName, subPath. NOTE: May require MountInput interface changes."
        is_test: false
      - path: "controller/src/main/java/yeetcd/controller/execution/S3ClientFactory.java"
        action: "create"
        description: "Factory for creating S3 client to connect to RustFS for test verification and file upload/download"
        is_test: false
      - path: "controller/src/main/java/yeetcd/controller/execution/KubernetesExecutionEngine.java"
        action: "modify"
        description: "Add PVC support: inject PipelinePvcManager, configure pod volumes for input/output, implement removeImage(), handle inputFilePaths and outputDirectoryPaths using PVC mounts"
        is_test: false
      - path: "controller/src/main/java/yeetcd/controller/config/Config.java"
        action: "modify"
        description: "Add S3/RustFS configuration: endpoint, accessKey, secretKey, bucketName"
        is_test: false
      - path: "controller/src/test/java/yeetcd/controller/execution/PipelinePvcManagerTest.java"
        action: "create"
        description: "Unit tests for PipelinePvcManager"
        is_test: true
      - path: "controller/src/test/java/yeetcd/controller/execution/KubernetesExecutionEnginePvcIT.java"
        action: "create"
        description: "Integration tests for PVC-based input/output handling"
        is_test: true
      - path: "controller/src/test/java/yeetcd/controller/execution/KubernetesExecutionEngineTest.java"
        action: "modify"
        description: "Remove @Disabled annotation, update to use TestClusterFixture, ensure all 5 AbstractExecutionEngineTest tests pass"
        is_test: true
      - path: "controller/pom.xml"
        action: "modify"
        description: "Add AWS S3 SDK dependency for test verification"
        is_test: false
    test_cases:
      - description: "PVC is created with correct StorageClass"
        type: "unit"
        target_component: "PipelinePvcManager"
        contracts: ["PipelinePvcManager.createPvc()"]
        given_when_then: "GIVEN: k3d cluster exists with RustFS deployed, WHEN: createPvc('test-pipeline') is called, THEN: PVC is created with storageClassName 'yeetcd-s3' and status 'Bound'"
      - description: "PVC is deleted successfully"
        type: "unit"
        target_component: "PipelinePvcManager"
        contracts: ["PipelinePvcManager.deletePvc()"]
        given_when_then: "GIVEN: PVC exists for a pipeline, WHEN: deletePvc(pvcName) is called, THEN: PVC is deleted from the namespace"
      - description: "PVC status is retrieved correctly"
        type: "unit"
        target_component: "PipelinePvcManager"
        contracts: ["PipelinePvcManager.getPvcStatus()"]
        given_when_then: "GIVEN: PVC exists, WHEN: getPvcStatus(pvcName) is called, THEN: correct status (Bound/Pending) is returned"
      - description: "Input files are available in pod via PVC"
        type: "integration"
        target_component: "KubernetesExecutionEngine"
        contracts: ["KubernetesExecutionEngine.runJob()", "PipelinePvcManager.createPvc()"]
        given_when_then: "GIVEN: PVC exists with input files uploaded to work-specific subdirectory, WHEN: job is run with inputFilePaths, THEN: pod mounts PVC and files are accessible at specified mount path"
      - description: "Output files are extracted from PVC"
        type: "integration"
        target_component: "KubernetesExecutionEngine"
        contracts: ["KubernetesExecutionEngine.runJob()", "PipelinePvcManager.createPvc()"]
        given_when_then: "GIVEN: job writes files to output directory on PVC, WHEN: job completes, THEN: output files are retrievable via S3 API from RustFS"
      - description: "removeImage deletes image from registry"
        type: "integration"
        target_component: "KubernetesExecutionEngine"
        contracts: ["KubernetesExecutionEngine.removeImage()"]
        given_when_then: "GIVEN: image exists in registry, WHEN: removeImage(imageId) is called, THEN: image is deleted from registry"
      - description: "shouldRunAJob passes"
        type: "integration"
        target_component: "KubernetesExecutionEngine"
        contracts: ["KubernetesExecutionEngine.runJob()"]
        given_when_then: "GIVEN: k3d cluster with RustFS deployed, WHEN: simple echo job is submitted, THEN: job completes with exit code 0 and stdout contains expected output"
      - description: "shouldMakeEnvironmentVariablesAvailable passes"
        type: "integration"
        target_component: "KubernetesExecutionEngine"
        contracts: ["KubernetesExecutionEngine.runJob()"]
        given_when_then: "GIVEN: k3d cluster with RustFS deployed, WHEN: job is submitted with env vars, THEN: env vars are available in container"
      - description: "shouldMakeInputFilesAvailable passes"
        type: "integration"
        target_component: "KubernetesExecutionEngine"
        contracts: ["KubernetesExecutionEngine.runJob()", "PipelinePvcManager.createPvc()"]
        given_when_then: "GIVEN: k3d cluster with RustFS deployed, WHEN: job is submitted with input files via PVC, THEN: input files are accessible in container"
      - description: "shouldExtractOutputFiles passes"
        type: "integration"
        target_component: "KubernetesExecutionEngine"
        contracts: ["KubernetesExecutionEngine.runJob()", "PipelinePvcManager.createPvc()"]
        given_when_then: "GIVEN: k3d cluster with RustFS deployed, WHEN: job writes output files to PVC, THEN: output files are extracted and available in JobResult"
      - description: "shouldBuildAndRunAJavaImage passes"
        type: "integration"
        target_component: "KubernetesExecutionEngine"
        contracts: ["KubernetesExecutionEngine.buildImage()", "KubernetesExecutionEngine.runJob()", "KubernetesExecutionEngine.removeImage()"]
        given_when_then: "GIVEN: k3d cluster with RustFS deployed, WHEN: Java image is built and run, THEN: image executes correctly and is cleaned up"
status: "planned"
