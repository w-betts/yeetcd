          WHEN: Execute(ctx, pipeline, outputHandler) is called

          THEN: PipelineResult.PipelineStatus equals SUCCESS, work1 and work2 both have WorkStatus.SUCCESS, events recorded: PipelineStarted, WorkStarted(work1), WorkFinished(work1,SUCCESS), WorkStarted(work2), WorkFinished(work2,SUCCESS), PipelineFinished(SUCCESS)"
      - description: "PipelineController Execute fails pipeline when one work fails"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "PipelineController.Execute()"
          - "Work.Execute()"
        given_when_then: "GIVEN: Pipeline with work1 (successful) and work2 (failure, depends on work1), mock ExecutionEngine returning exitCode=1 for work2

          WHEN: Execute(ctx, pipeline, outputHandler) is called

          THEN: PipelineResult.PipelineStatus equals FAILURE, work1 has WorkStatus.SUCCESS, work2 has WorkStatus.FAILURE, events recorded: PipelineStarted, WorkStarted(work1), WorkFinished(work1,SUCCESS), WorkStarted(work2), WorkFinished(work2,FAILURE), PipelineFinished(FAILURE)"
      - description: "PipelineController Execute skips works which depend on failed work"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
