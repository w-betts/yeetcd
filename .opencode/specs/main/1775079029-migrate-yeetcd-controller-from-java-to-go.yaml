          - "Work.Execute()"
          - "PreviousWorkStatusCondition.Evaluate()"
        given_when_then: "GIVEN: Pipeline with work1 (failure) and work2 (depends on work1 with PREVIOUS_WORK_SUCCESS condition), mock ExecutionEngine returning exitCode=1 for work1

          WHEN: Execute(ctx, pipeline, outputHandler) is called

          THEN: PipelineResult.PipelineStatus equals FAILURE, work1 has WorkStatus.FAILURE, work2 has WorkStatus.SKIPPED (condition not met), events recorded: PipelineStarted, WorkStarted(work1), WorkFinished(work1,FAILURE), WorkFinished(work2,SKIPPED), PipelineFinished(FAILURE)"
      - description: "PipelineController Execute runs explicitly listed and dependency work once only"
