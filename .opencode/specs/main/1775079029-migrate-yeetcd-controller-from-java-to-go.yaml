        given_when_then: "GIVEN: Pipeline with parameters and workContext={keyToOverride: originalValue, keyNotOverridden: value}, Arguments with keyToOverride=argumentValue and newKey=newValue, mock ExecutionEngine capturing env vars

          WHEN: Execute(ctx, pipeline.WithArguments(arguments), outputHandler) is called

          THEN: work receives merged context with keyToOverride=argumentValue (overridden by argument), keyNotOverridden=value, newKey=newValue"
