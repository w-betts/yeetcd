          - "WorkResultTracker.OutputDirectoriesMountInput()"
        given_when_then: "GIVEN: work1 with outputPaths=[{name: 'output', path: '/var/output'}], work2 with previousWork=[{work: work1, outputPathsMount: '/work1'}], mock ExecutionEngine that creates file at /var/output and captures mount paths

          WHEN: Execute(ctx, pipeline, outputHandler) is called

          THEN: work2's JobDefinition.InputFilePaths contains '/work1' mapped to work1's output directory, work2 can read files from /work1/output"
      - description: "PipelineController Execute mounts output directory from previous work"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "PipelineController.Execute()"
          - "Work.previousWorkMountInputs()"
        given_when_then: "GIVEN: work1 with outputPaths=[{name: 'outputDir', path: '/var/output'}] that creates directory with file, work2 with previousWork=[{work: work1, outputPathsMount: '/work1'}], mock ExecutionEngine

          WHEN: Execute(ctx, pipeline, outputHandler) is called

          THEN: work2's JobDefinition.InputFilePaths contains '/work1' mapping, work2 can read /work1/outputDir/file"
      - description: "PipelineController Execute sets stdout env var from previous work"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "PipelineController.Execute()"
          - "Work.previousWorkStdOutAsWorkContext()"
          - "WorkResultTracker.StdOut()"
        given_when_then: "GIVEN: work1 that outputs 'stdoutValue' to stdout, work2 with previousWork=[{work: work1, stdOutEnvVar: 'PREV_STDOUT'}], mock ExecutionEngine capturing env vars

          WHEN: Execute(ctx, pipeline, outputHandler) is called

          THEN: work2's JobDefinition.Environment contains PREV_STDOUT=stdoutValue"
      - description: "PipelineController Execute runs work if complex condition is met"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "PipelineController.Execute()"
          - "AndCondition.Evaluate()"
          - "NotCondition.Evaluate()"
          - "OrCondition.Evaluate()"
          - "WorkContextCondition.Evaluate()"
        given_when_then: "GIVEN: work with workContext={key: value} and condition=AND(WorkContextCondition(key, EQUALS, value), NOT(OR(WorkContextCondition('missing1', EQUALS, ''), WorkContextCondition('missing2', EQUALS, '')))), mock ExecutionEngine

          WHEN: Execute(ctx, pipeline, outputHandler) is called

          THEN: condition evaluates true (first part true, second part NOT(OR(false, false))=true), work executes with WorkStatus.SUCCESS"
      - description: "PipelineController Execute does not run work if condition not met"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "PipelineController.Execute()"
          - "NotCondition.Evaluate()"
          - "WorkContextCondition.Evaluate()"
        given_when_then: "GIVEN: work with workContext={key: value} and condition=NOT(WorkContextCondition(key, EQUALS, value)), mock ExecutionEngine

          WHEN: Execute(ctx, pipeline, outputHandler) is called

          THEN: condition evaluates false (NOT(true)=false), work is skipped with WorkStatus.SKIPPED, no container is run"
      - description: "PipelineController Execute runs work after failure if condition is met"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "PipelineController.Execute()"
          - "PreviousWorkStatusCondition.Evaluate()"
        given_when_then: "GIVEN: work1 (failure), work2 (depends on work1) with condition=PreviousWorkStatusCondition(FAILURE), mock ExecutionEngine returning exitCode=1 for work1

          WHEN: Execute(ctx, pipeline, outputHandler) is called

          THEN: work1 has WorkStatus.FAILURE, work2's condition evaluates true (FAILURE status matches), work2 executes with WorkStatus.SUCCESS, PipelineStatus equals FAILURE (due to work1 failure)"
      - description: "Work Execute recursively executes previous work dependencies"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "Work.Execute()"
          - "WorkResultTracker.GetOrExecute()"
        given_when_then: "GIVEN: work1, work2 (depends on work1), work3 (depends on work2), mock ExecutionEngine, WorkResultTracker

          WHEN: work3.Execute(ctx, emptyContext, engine, metadata, tracker, handler) is called

          THEN: work1 executes first, work2 executes after work1, work3 executes after work2, all results stored in tracker"
      - description: "Work Execute merges work context with containing context"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "Work.Execute()"
          - "WorkContext.MergeInto()"
        given_when_then: "GIVEN: work with workContext={workKey: workValue, sharedKey: workOverride}, containingContext={sharedKey: containerValue, containerKey: containerValue}, mock ExecutionEngine capturing env vars

          WHEN: work.Execute(ctx, containingContext, engine, metadata, tracker, handler) is called

          THEN: WorkDefinition.Execute() receives merged context with workKey=workValue, sharedKey=workOverride (work overrides container), containerKey=containerValue"
      - description: "ContainerisedWorkDefinition Execute creates correct JobDefinition"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "ContainerisedWorkDefinition.Execute()"
          - "ExecutionEngine.RunJob()"
        given_when_then: "GIVEN: ContainerisedWorkDefinition with image='test:latest', cmd=['echo', 'hello'], work with previousWork stdout env vars and mount inputs, mock ExecutionEngine

          WHEN: Execute(ctx, workContext, engine, metadata, work, tracker, handler) is called

          THEN: RunJob() is called with JobDefinition containing image='test:latest', cmd=['echo', 'hello'], workingDir='/', env including previous work stdout, mounts including previous work outputs"
      - description: "ContainerisedWorkDefinition Execute maps exit code to WorkStatus"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "ContainerisedWorkDefinition.Execute()"
        given_when_then: "GIVEN: ContainerisedWorkDefinition, mock ExecutionEngine returning JobResult{ExitCode: 0}

          WHEN: Execute() is called

          THEN: WorkResult.WorkStatus equals SUCCESS


          GIVEN: mock ExecutionEngine returning JobResult{ExitCode: 1}

          WHEN: Execute() is called

          THEN: WorkResult.WorkStatus equals FAILURE"
      - description: "CompoundWorkDefinition Execute runs all final work items"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "CompoundWorkDefinition.Execute()"
          - "Work.Execute()"
        given_when_then: "GIVEN: CompoundWorkDefinition with finalWork=[work1, work2], mock ExecutionEngine, WorkResultTracker

          WHEN: Execute(ctx, workContext, engine, metadata, compoundWork, tracker, handler) is called

          THEN: work1.Execute() and work2.Execute() are both called, WorkResult.WorkStatus equals SUCCESS if both succeed, FAILURE if any fail"
      - description: "NativeWorkDefinition Execute uses built source image"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "NativeWorkDefinition.Execute()"
          - "ExecutionEngine.RunJob()"
        given_when_then: "GIVEN: NativeWorkDefinition with executionId='customTask123', PipelineMetadata with builtSourceImage='sha256:abc', SourceLanguage=JAVA, mock ExecutionEngine

          WHEN: Execute(ctx, workContext, engine, metadata, work, tracker, handler) is called

          THEN: RunJob() is called with JobDefinition.Image equals 'sha256:abc', JobDefinition.Cmd equals JAVA.GetCustomTaskRunnerCmd(pipelineName, 'customTask123')"
      - description: "DynamicWorkGeneratingWorkDefinition Execute generates and runs dynamic work"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "DynamicWorkGeneratingWorkDefinition.Execute()"
          - "Work.FromProtobuf()"
        given_when_then: "GIVEN: DynamicWorkGeneratingWorkDefinition, mock ExecutionEngine that returns stdout containing valid protobuf Work message, mock Work.FromProtobuf()

          WHEN: Execute() is called and succeeds (exitCode=0)

          THEN: stdout is parsed as protobuf Work, generated work's Execute() is called recursively, final WorkResult reflects generated work's status"
  - name: "Phase 4: CLI Implementation"
    description: "Implement CLI entry point with cobra. Wire together core package with Docker executor. End-to-end tests building and running java-sample project. This is the first user-facing deliverable."
    status: "pending"
    is_release_boundary: true
    file_changes:
      - path: "cmd/yeetcd/main.go"
        action: "create"
        description: "CLI entry point using cobra. Initializes root command with 'run' and 'list' subcommands. Sets up logging with slog. Handles version flag. Main function calls cobra.Execute()."
        is_test: false
      - path: "cmd/yeetcd/run.go"
        action: "create"
        description: "yeetcd run command implementation. Flags: --source (required, path to zip file), --pipeline (required, pipeline name), --argument (optional, repeatable, format KEY=VALUE). Logic: (1) read zip file, (2) create Source, (3) create PipelineController with DockerExecutionEngine, (4) call Assemble(), (5) find named pipeline, (6) apply arguments, (7) call Execute() with CLI output handler, (8) print result, (9) exit with appropriate code. Uses slog for progress logging."
        is_test: false
      - path: "cmd/yeetcd/list.go"
        action: "create"
        description: "yeetcd list command implementation. Flags: --source (required, path to zip file). Logic: (1) read zip file, (2) create Source, (3) create PipelineController with DockerExecutionEngine, (4) call Assemble(), (5) print pipeline names and their parameters. Uses slog for progress logging."
        is_test: false
      - path: "internal/cli/output_handler.go"
        action: "create"
        description: "CLI-specific PipelineOutputHandler implementation. RecordEvent() logs events using slog with appropriate log levels (PipelineStarted=info, WorkStarted=info, WorkFinished=info with status, PipelineFinished=info with status). NewJobStreams() returns JobStreams with os.Stdout/os.Stderr for live output. Mirrors Java TestPipelineOutputHandler but with CLI-friendly logging."
        is_test: false
      - path: "internal/cli/progress_reporter.go"
        action: "create"
        description: "ProgressReporter implementation for CLI. Wraps PipelineOutputHandler to provide human-readable progress output. Methods: PipelineStarted() prints 'Starting pipeline: <name>', WorkStarted() prints '  Running: <work description>', WorkFinished() prints '  Done: <work description> (<status>)', PipelineFinished() prints 'Pipeline completed: <status>'. Uses terminal detection for color output."
        is_test: false
      - path: "internal/testutil/archive.go"
        action: "create"
        description: "Test utility for creating project zips. Function: CreateProjectZip(rootDir string) ([]byte, error) - creates zip of directory excluding 'target' directories and hidden files. Function: CreateProjectZipFromCurrentRepo() ([]byte, error) - creates zip of repository root (detected by finding go.mod). Mirrors Java ArchiveUtils.projectZip() functionality."
        is_test: true
      - path: "internal/testutil/java_sample.go"
        action: "create"
        description: "Test utility for java-sample project. Function: GetJavaSampleZip() ([]byte, error) - returns cached zip of java-sample project. Function: GetJavaSampleZipWithRepo() ([]byte, error) - returns zip of entire repository (needed because java-sample depends on java-sdk and protocol). Caches zip in sync.Once for test performance. Mirrors Java ArchiveUtils.projectZip() which zips entire repo root."
        is_test: true
      - path: "e2e/java_sample_test.go"
        action: "create"
        description: "End-to-end tests for java-sample project. Tests replicate JavaSampleTest.java coverage: shouldBuildTheJavaSampleApplication, shouldAssembleAndExecuteTheJavaSamplePipeline, shouldAssembleAndExecuteTheJavaSampleCompoundPipeline, shouldAssembleAndExecuteTheJavaSampleWorkContextPipeline, shouldAssembleAndExecuteTheJavaSampleWithParametersPipeline, shouldAssembleAndExecuteTheJavaSampleWithWorkOutputsPipeline, shouldAssembleAndExecuteTheJavaSampleWithConditionsPipeline, shouldAssembleAndExecuteTheJavaSampleDynamicWorkPipeline. Uses real Docker daemon. Each test creates PipelineController, assembles source, executes pipeline, verifies status and event sequence."
        is_test: true
      - path: "e2e/cli_test.go"
        action: "create"
        description: "End-to-end tests for CLI commands. Tests: 'yeetcd list' shows all pipelines from java-sample, 'yeetcd run --source <zip> --pipeline sample' executes successfully, 'yeetcd run' with --argument passes arguments to pipeline, 'yeetcd run' with invalid pipeline name returns error, 'yeetcd run' with missing source returns error. Uses exec.Command to run actual CLI binary."
        is_test: true
    test_cases:
      - description: "CLI yeetcd list shows all pipelines from java-sample project"
        type: "e2e"
        target_component: "cmd/yeetcd"
        contracts:
          - "PipelineController.Assemble()"
          - "Pipeline.name()"
        given_when_then: "GIVEN: Real Docker daemon, java-sample project zip, built yeetcd CLI binary


          WHEN: 'yeetcd list --source <zip>' is executed


          THEN: Output contains pipeline names: sample, sampleCompound, sampleWithWorkContext, sampleWithParameters, sampleWithWorkOutputs, sampleWithConditions, sampleDynamicWork"
      - description: "CLI yeetcd run executes sample pipeline successfully"
