# Spec (updated)
# Updated: 2026-04-01T22:32:57.882Z

version: 2
problem_statement: "The yeetcd controller is currently implemented in Java, requiring a JVM and making deployment heavier than needed. We need to migrate the core controller functionality to Go to support three execution modes: (1) CLI with Docker executor for local development, (2) CLI with Mock executor for testing, and (3) Kubernetes Operator for production deployment. The immediate scope is CLI + Docker executor, but the core package interfaces must be designed to support all three modes."
goals:
  - "Create a Go core package with well-defined interfaces for execution engines, build services, and progress reporting"
  - "Implement a Docker execution engine that can build images and run containers"
  - "Implement source building (extract zip, build in container, generate protobuf definitions)"
  - "Implement pipeline execution with work dependencies, conditions, context merging, and output handling"
  - "Create a CLI that can run pipelines from source code using the Docker executor"
  - "Replicate the existing Java controller test coverage in Go"
constraints:
  - "Keep the Java SDK for pipeline definitions - Go SDK is out of scope for now"
  - "Reuse existing protobuf definitions from protocol/src/main/proto - single .proto file for all languages"
  - "Monorepo structure with single Go module - internal packages for core, cmd/ for CLI and operator"
  - "Design interfaces to support Docker, Mock, and Kubernetes executors from the start"
  - "Must pass equivalent test coverage to Java controller (PipelineControllerTest, AbstractExecutionEngineTest, JavaSampleTest)"
tech_choices:
  - area: "language"
    choice: "Go 1.21+"
    rationale: "User preference, single binary deployment, good Docker/Kubernetes ecosystem"
  - area: "protobuf"
    choice: "protoc with protoc-gen-go"
    rationale: "Standard Go protobuf generation, reuse existing .proto file"
  - area: "docker"
    choice: "docker/docker client library"
    rationale: "Official Go Docker SDK for container management"
  - area: "cli"
    choice: "cobra"
    rationale: "Standard Go CLI framework, good composability"
  - area: "testing"
    choice: "standard Go testing + testify"
    rationale: "Standard Go testing with useful assertions"
architecture:
  description: "Go core package with clean interfaces separating pipeline logic from execution. The core package handles pipeline assembly, work scheduling, dependency resolution, and condition evaluation. Execution engines implement a common interface for running containers. The CLI provides a user-facing entry point that wires together the core package with the Docker executor."
  components:
    - name: "Core Package (internal/core)"
      responsibility: "Pipeline types, work scheduling, dependency resolution, condition evaluation, context merging"
      interfaces:
        - "Pipeline, Work, WorkDefinition types from protobuf"
        - "Scheduler for work execution ordering"
        - "Condition evaluator"
    - name: "Engine Package (pkg/engine)"
      responsibility: "ExecutionEngine interface and Docker implementation"
      interfaces:
        - "ExecutionEngine.BuildImage(ctx, BuildImageDefinition) BuildImageResult"
        - "ExecutionEngine.RunJob(ctx, JobDefinition) JobResult"
        - "ExecutionEngine.RemoveImage(ctx, imageID) error"
    - name: "Build Package (pkg/build)"
      responsibility: "Source building - extract zip, build in container, generate protobuf"
      interfaces:
        - "BuildService.Build(ctx, Source) BuildResult"
    - name: "Progress Package (pkg/progress)"
      responsibility: "Progress reporting interface for CLI output and future operator status"
      interfaces:
        - "ProgressReporter.PipelineStarted(pipeline)"
        - "ProgressReporter.WorkStarted(work, streams)"
        - "ProgressReporter.WorkFinished(work, status)"
    - name: "CLI (cmd/yeetcd)"
      responsibility: "Command-line interface entry point"
      interfaces:
        - "yeetcd run --source <zip> --pipeline <name>"
test_strategy:
  approach: "Unit tests for each package with mocked dependencies. Integration tests using real Docker. End-to-end tests building and running java-sample project."
  test_patterns:
    - language: "go"
      pattern: "*_test.go"
phases:
  - name: "Phase 1: Core Package Foundation"
    description: "Set up Go module structure, generate protobuf Go code, define core interfaces, implement pipeline/work types. This phase establishes the foundational types and contracts that all other phases depend on."
    status: "completed"
    is_release_boundary: false
    file_changes:
      - action: "create"
        description: "Go module definition at repository root with module name 'github.com/yeetcd/yeetcd' and Go 1.21+ requirement. Dependencies: google.golang.org/protobuf for protobuf, gopkg.in/yaml.v3 for YAML parsing, github.com/stretchr/testify for testing. Coexists with existing pom.xml at root."
        is_test: false
        path: "go.mod"
      - action: "create"
        description: "Go dependencies checksum file (auto-generated by go mod tidy)"
        is_test: false
        path: "go.sum"
      - action: "modify"
        description: "Add Go package option 'option go_package = \"github.com/yeetcd/yeetcd/internal/core/proto/pipeline\";' to enable Go protobuf generation. Keep existing Java package options intact."
        is_test: false
        path: "protocol/src/main/proto/yeetcd/protocol/pipeline/pipeline.proto"
      - action: "create"
        description: "Generated Go protobuf code from pipeline.proto. Contains Go structs for Pipeline, Work, WorkDefinition types, Conditions, Parameters, etc. Generated via 'protoc --go_out=. --go_opt=module=github.com/yeetcd/yeetcd protocol/src/main/proto/yeetcd/protocol/pipeline/pipeline.proto'"
        is_test: false
        path: "internal/core/proto/pipeline/pipeline.pb.go"
      - action: "create"
        description: "Pipeline type with methods: FromProtobuf(), WithArguments(). Contains name, parameters, workContext, finalWork, and metadata fields. Mirrors Java Pipeline record."
        is_test: false
        path: "internal/core/pipeline/pipeline.go"
      - action: "create"
        description: "Work type with methods: FromProtobuf(), Execute(), PreviousWorkStdOutAsWorkContext(), PreviousWorkMountInputs(), OutputDirectoryPaths(). Contains id, description, workContext, workDefinition, condition, outputPaths, previousWork fields. Mirrors Java Work record."
        is_test: false
        path: "internal/core/pipeline/work.go"
      - action: "create"
        description: "WorkContext type with methods: Empty(), FromMap(), MergeInto(). Simple map[string]string wrapper for work context key-value pairs. Mirrors Java WorkContext record."
        is_test: false
        path: "internal/core/pipeline/work_context.go"
      - action: "create"
        description: "WorkDefinition interface with Execute() method. Also defines ContainerisedWorkDefinition, CustomWorkDefinition, CompoundWorkDefinition, DynamicWorkGeneratingWorkDefinition structs implementing this interface."
        is_test: false
        path: "internal/core/pipeline/work_definition.go"
      - action: "create"
        description: "FromWorkProtobuf() function to convert protobuf Work to appropriate WorkDefinition type. Mirrors Java WorkDefinitions class."
        is_test: false
        path: "internal/core/pipeline/work_definitions.go"
      - action: "create"
        description: "PreviousWork type with work, outputPathsMount, stdOutEnvVar fields. FromProtobuf() method. Mirrors Java PreviousWork record."
        is_test: false
        path: "internal/core/pipeline/previous_work.go"
      - action: "create"
        description: "WorkOutputPath type with name, path fields. FromProtobuf() method. Mirrors Java WorkOutputPath record."
        is_test: false
        path: "internal/core/pipeline/work_output_path.go"
      - action: "create"
        description: "WorkResult type with workStatus, outputDirectoriesParent, jobStreams fields. Mirrors Java WorkResult record."
        is_test: false
        path: "internal/core/pipeline/work_result.go"
      - action: "create"
        description: "WorkStatus enum with SUCCESS, SKIPPED, FAILURE values. Mirrors Java WorkStatus enum."
        is_test: false
        path: "internal/core/pipeline/work_status.go"
      - action: "create"
        description: "WorkResultTracker type with GetOrExecute(), GetWorkResultMap(), OutputDirectoriesMountInput(), StdOut() methods. Thread-safe map for tracking work execution results. Mirrors Java WorkResultTracker class."
        is_test: false
        path: "internal/core/pipeline/work_result_tracker.go"
      - action: "create"
        description: "Parameter type with TypeCheck enum (STRING, NUMBER, BOOLEAN), ValidateArgument() method. FromProtobuf() method. Mirrors Java Parameter record."
        is_test: false
        path: "internal/core/pipeline/parameter.go"
      - action: "create"
        description: "Parameters type wrapping map[string]Parameter. Empty(), FromMap() methods. Mirrors Java Parameters record."
        is_test: false
        path: "internal/core/pipeline/parameters.go"
      - action: "create"
        description: "Arguments type with AsValidatedWorkContext() method that validates arguments against parameters. Of() factory methods. Mirrors Java Arguments record."
        is_test: false
        path: "internal/core/pipeline/arguments.go"
      - action: "create"
        description: "PipelineMetadata type with pipelineName, builtSourceImage, sourceLanguage fields. Mirrors Java PipelineMetadata record."
        is_test: false
        path: "internal/core/pipeline/pipeline_metadata.go"
      - action: "create"
        description: "PipelineStatus enum with SUCCESS, FAILURE values. Mirrors Java PipelineStatus enum."
        is_test: false
        path: "internal/core/pipeline/pipeline_status.go"
      - action: "create"
        description: "PipelineResult type with workResults map and PipelineStatus() method. Mirrors Java PipelineResult record."
        is_test: false
        path: "internal/core/pipeline/pipeline_result.go"
      - action: "create"
        description: "PipelineOutputHandler interface with RecordEvent() and NewJobStreams() methods. Mirrors Java PipelineOutputHandler interface."
        is_test: false
        path: "internal/core/pipeline/pipeline_output_handler.go"
      - action: "create"
