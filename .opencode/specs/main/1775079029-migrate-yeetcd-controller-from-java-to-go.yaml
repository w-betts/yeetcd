      - description: "PipelineController Execute runs compound work"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "PipelineController.Execute()"
          - "CompoundWorkDefinition.Execute()"
        given_when_then: "GIVEN: Pipeline with compoundWork containing [work2] where work2 depends on work1, mock ExecutionEngine

          WHEN: Execute(ctx, pipeline, outputHandler) is called

          THEN: work1 executes, work2 executes, compoundWork has WorkStatus.SUCCESS, all three recorded in workResults, PipelineStatus equals SUCCESS"
      - description: "PipelineController Execute runs identical work in different compound work only once"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "PipelineController.Execute()"
          - "WorkResultTracker.GetOrExecute()"
        given_when_then: "GIVEN: Pipeline with compoundWork1 containing [work1], compoundWork2 (depends on compoundWork1) containing [work1], mock ExecutionEngine

          WHEN: Execute(ctx, pipeline, outputHandler) is called

          THEN: work1 executes exactly once (shared between both compound works), compoundWork1 and compoundWork2 both have WorkStatus.SUCCESS, PipelineStatus equals SUCCESS"
      - description: "PipelineController Execute includes and overrides containing work contexts"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "PipelineController.Execute()"
          - "WorkContext.MergeInto()"
        given_when_then: "GIVEN: Pipeline with workContext={pipelineKey: pipelineValue, innerOverride: willBeOverridden}, compoundWork with workContext={compoundOverride: compoundValue}, innerWork with workContext={innerOverride: innerValue}, mock ExecutionEngine capturing env vars

