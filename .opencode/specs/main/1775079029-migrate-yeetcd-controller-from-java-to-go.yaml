        given_when_then: "GIVEN: Pipeline with finalWork=[work1, work2] where work2 depends on work1, mock ExecutionEngine

          WHEN: Execute(ctx, pipeline, outputHandler) is called

          THEN: work1 is executed exactly once (not twice), work2 is executed once, both have WorkStatus.SUCCESS, PipelineStatus equals SUCCESS"
      - description: "PipelineController Execute runs multiple dependencies of a work"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "PipelineController.Execute()"
          - "Work.Execute()"
        given_when_then: "GIVEN: Pipeline with work1, work2 (independent), and work3 (depends on both work1 and work2), mock ExecutionEngine

