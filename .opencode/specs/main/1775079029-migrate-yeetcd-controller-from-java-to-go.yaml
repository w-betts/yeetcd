        is_test: false
        path: "internal/core/pipeline/events/pipeline_event.go"
      - action: "create"
        description: "PipelineStarted event type with pipeline field. Mirrors Java PipelineStarted record."
        is_test: false
        path: "internal/core/pipeline/events/pipeline_started.go"
      - action: "create"
        description: "PipelineFinished event type with pipelineStatus field. Mirrors Java PipelineFinished record."
        is_test: false
        path: "internal/core/pipeline/events/pipeline_finished.go"
      - action: "create"
        description: "WorkStarted event type with work, jobStreams fields. Mirrors Java WorkStarted record."
        is_test: false
        path: "internal/core/pipeline/events/work_started.go"
      - action: "create"
        description: "WorkFinished event type with work, workStatus fields. Mirrors Java WorkFinished record."
        is_test: false
        path: "internal/core/pipeline/events/work_finished.go"
      - action: "create"
        description: "Condition interface with Evaluate(workContext, workResultTracker) method. Mirrors Java Condition interface."
        is_test: false
        path: "internal/core/condition/condition.go"
      - action: "create"
        description: "Conditions factory with FromProtobuf() and PREVIOUS_WORK_SUCCESS constant. Mirrors Java Conditions class."
        is_test: false
        path: "internal/core/condition/conditions.go"
      - action: "create"
        description: "WorkContextCondition type with key, operand, value fields. Operand enum with EQUALS. Evaluate() method. FromProtobuf() method. Mirrors Java WorkContextCondition record."
        is_test: false
        path: "internal/core/condition/work_context_condition.go"
      - action: "create"
        description: "PreviousWorkStatusCondition type with Status enum (SUCCESS, FAILURE, ANY). Evaluate() method checks completed work results. FromProtobuf() method. Mirrors Java PreviousWorkStatusCondition record."
        is_test: false
        path: "internal/core/condition/previous_work_status_condition.go"
      - action: "create"
        description: "AndCondition type with left, right Condition fields. Evaluate() returns left && right. FromProtobuf() method. Mirrors Java AndCondition record."
        is_test: false
        path: "internal/core/condition/and_condition.go"
      - action: "create"
        description: "OrCondition type with left, right Condition fields. Evaluate() returns left || right. FromProtobuf() method. Mirrors Java OrCondition record."
        is_test: false
        path: "internal/core/condition/or_condition.go"
      - action: "create"
        description: "NotCondition type with condition field. Evaluate() returns !condition. FromProtobuf() method. Mirrors Java NotCondition record."
        is_test: false
        path: "internal/core/condition/not_condition.go"
      - action: "create"
        description: "YeetcdConfig type for yeetcd.yaml parsing. Contains Name, Language (SourceLanguage interface), BuildImage, BuildCmd, Artifacts fields. Load() function to parse YAML file. Mirrors Java YeetcdDefinition record."
        is_test: false
        path: "pkg/config/config.go"
      - action: "create"
        description: "ArtifactDefinition type with Name, Path fields. Mirrors Java ArtifactDefinition record."
        is_test: false
        path: "pkg/config/artifact.go"
      - action: "create"
        description: "SourceLanguage interface with methods: GetImageBase() ImageBase, GetGeneratePipelineDefinitionsCmd() string, GetCustomTaskRunnerCmd(pipelineName, taskName string) string. JavaSourceLanguage struct implements this interface. Mirrors Java SourceLanguage enum with abstract methods."
        is_test: false
        path: "pkg/config/source_language.go"
      - action: "create"
        description: "ImageBase enum with JAVA value. BaseImage() and EntryPoint() methods. Mirrors Java ImageBase enum."
        is_test: false
        path: "pkg/engine/image_base.go"
      - action: "create"
        description: "ExecutionEngine interface with BuildImage(ctx, BuildImageDefinition), RemoveImage(ctx, imageID), RunJob(ctx, JobDefinition) methods. Returns errors instead of futures for Go idiomatic style. Mirrors Java ExecutionEngine interface."
        is_test: false
        path: "pkg/engine/engine.go"
      - action: "create"
        description: "BuildImageDefinition type with Image, Tag, ImageBase, ArtifactDirectory, ArtifactNames, Cmd fields. Mirrors Java BuildImageDefinition record."
        is_test: false
        path: "pkg/engine/build_image_definition.go"
      - action: "create"
        description: "BuildImageResult type with ImageID field. Mirrors Java BuildImageResult record."
        is_test: false
        path: "pkg/engine/build_image_result.go"
      - action: "create"
        description: "JobDefinition type with Image, Cmd, WorkingDir, Environment, InputFilePaths, OutputDirectoryPaths, JobStreams fields. Mirrors Java JobDefinition record."
        is_test: false
        path: "pkg/engine/job_definition.go"
      - action: "create"
        description: "JobResult type with ExitCode, OutputDirectoriesParent fields. Mirrors Java JobResult record."
        is_test: false
        path: "pkg/engine/job_result.go"
      - action: "create"
        description: "JobStreams type with stdout/stderr capture via io.Writer interface. GetStdOut(), GetStdErr() methods return []byte. Mirrors Java JobStreams class."
        is_test: false
        path: "pkg/engine/job_streams.go"
      - action: "create"
        description: "MountInput interface with Directory() method. OnDiskMountInput implementation. Mirrors Java MountInput interface and OnDiskMountInput record."
        is_test: false
        path: "pkg/engine/mount_input.go"
      - action: "create"
        description: "BuildService interface with Build(ctx, Source) method returning BuildResult. Interface for source building (extract zip, build in container, generate protobuf)."
        is_test: false
        path: "pkg/build/build.go"
      - action: "create"
        description: "BuildResult type with ImageID, Pipelines fields. Result of source building."
        is_test: false
        path: "pkg/build/build_result.go"
      - action: "create"
        description: "ProgressReporter interface with PipelineStarted(pipeline), WorkStarted(work, streams), WorkFinished(work, status) methods. Interface for progress reporting (CLI output, future operator status)."
        is_test: false
        path: "pkg/progress/progress.go"
      - action: "create"
        description: "Unit tests for Pipeline type: FromProtobuf conversion, WithArguments merging, work context inheritance."
        is_test: true
        path: "internal/core/pipeline/pipeline_test.go"
      - action: "create"
        description: "Unit tests for WorkContext: Empty(), FromMap(), MergeInto() with override behavior."
        is_test: true
        path: "internal/core/pipeline/work_context_test.go"
      - action: "create"
        description: "Unit tests for Arguments validation: string/number/boolean type checking, choices validation, required parameter validation. Mirrors Java ArgumentsTest coverage."
        is_test: true
        path: "internal/core/pipeline/arguments_test.go"
      - action: "create"
        description: "Unit tests for Parameter: ValidateArgument() for STRING, NUMBER, BOOLEAN types, choices validation."
        is_test: true
        path: "internal/core/pipeline/parameter_test.go"
      - action: "create"
        description: "Unit tests for all condition types: WorkContextCondition EQUALS, PreviousWorkStatusCondition SUCCESS/FAILURE/ANY, AndCondition, OrCondition, NotCondition, complex nested conditions."
        is_test: true
        path: "internal/core/condition/condition_test.go"
      - action: "create"
        description: "Unit tests for Conditions factory: FromProtobuf() for all condition types, PREVIOUS_WORK_SUCCESS constant."
        is_test: true
        path: "internal/core/condition/conditions_test.go"
      - action: "create"
        description: "Unit tests for yeetcd.yaml parsing: valid config, missing fields, invalid language, artifact parsing."
        is_test: true
        path: "pkg/config/config_test.go"
      - action: "create"
        description: "Unit tests for SourceLanguage interface: JavaSourceLanguage.GetImageBase() returns JAVA ImageBase, JavaSourceLanguage.GetGeneratePipelineDefinitionsCmd() returns correct command, JavaSourceLanguage.GetCustomTaskRunnerCmd() returns correct command with pipelineName and taskName."
        is_test: true
        path: "pkg/config/source_language_test.go"
    test_cases:
      - description: "Pipeline FromProtobuf converts protobuf Pipeline message to Go Pipeline struct with all fields correctly mapped"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "Pipeline.FromProtobuf()"
        given_when_then: "GIVEN: Valid protobuf Pipeline message with name, parameters, workContext, and finalWork

          WHEN: FromProtobuf() is called

          THEN: Go Pipeline struct is created with all fields correctly mapped from protobuf"
      - description: "Pipeline WithArguments merges arguments into pipeline work context with correct override behavior"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "Pipeline.WithArguments()"
          - "Arguments.AsValidatedWorkContext()"
        given_when_then: "GIVEN: Pipeline with existing workContext and Parameters definition

          WHEN: WithArguments() is called with Arguments containing override values

          THEN: New Pipeline is returned with arguments merged into workContext, arguments override existing context values"
      - description: "WorkContext MergeInto correctly merges two contexts with source overriding destination"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "WorkContext.MergeInto()"
          - "WorkContext.FromMap()"
        given_when_then: "GIVEN: Two WorkContext maps with overlapping keys

          WHEN: MergeInto() is called

          THEN: Result contains all keys from both maps, with source context values overriding destination for duplicate keys"
      - description: "Arguments validation passes for valid STRING parameter with matching choice"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "Arguments.AsValidatedWorkContext()"
          - "Parameter.ValidateArgument()"
        given_when_then: "GIVEN: Parameter with TypeCheck STRING and choices ['value1', 'value2']

          WHEN: AsValidatedWorkContext() is called with argument 'value1'

          THEN: Validation passes and WorkContext contains the argument"
      - description: "Arguments validation fails for invalid NUMBER parameter (non-numeric value)"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "Arguments.AsValidatedWorkContext()"
          - "Parameter.ValidateArgument()"
        given_when_then: "GIVEN: Parameter with TypeCheck NUMBER

          WHEN: AsValidatedWorkContext() is called with argument 'not-a-number'

          THEN: Validation fails with error indicating invalid number format"
      - description: "Arguments validation fails for invalid BOOLEAN parameter (non-boolean value)"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "Arguments.AsValidatedWorkContext()"
          - "Parameter.ValidateArgument()"
        given_when_then: "GIVEN: Parameter with TypeCheck BOOLEAN

          WHEN: AsValidatedWorkContext() is called with argument 'not-a-boolean'

          THEN: Validation fails with error indicating invalid boolean value"
      - description: "Arguments validation fails when argument not in allowed choices"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "Arguments.AsValidatedWorkContext()"
          - "Parameter.ValidateArgument()"
        given_when_then: "GIVEN: Parameter with choices ['allowed1', 'allowed2']

          WHEN: AsValidatedWorkContext() is called with argument 'not-allowed'

          THEN: Validation fails with error indicating argument not in allowed choices"
      - description: "Arguments validation fails when required parameter is missing"
        type: "unit"
        target_component: "internal/core/pipeline"
        contracts:
          - "Arguments.AsValidatedWorkContext()"
        given_when_then: "GIVEN: Parameter with required=true

          WHEN: AsValidatedWorkContext() is called without providing that argument

          THEN: Validation fails with error indicating required parameter is missing"
      - description: "WorkContextCondition EQUALS evaluates true when context value matches"
        type: "unit"
        target_component: "internal/core/condition"
        contracts:
          - "WorkContextCondition.Evaluate()"
          - "WorkContextCondition.Operand.EQUALS"
        given_when_then: "GIVEN: WorkContext with key='myKey' value='expectedValue'

          WHEN: WorkContextCondition(key='myKey', operand=EQUALS, value='expectedValue').Evaluate() is called

          THEN: Returns true"
      - description: "WorkContextCondition EQUALS evaluates false when context value does not match"
        type: "unit"
        target_component: "internal/core/condition"
        contracts:
          - "WorkContextCondition.Evaluate()"
        given_when_then: "GIVEN: WorkContext with key='myKey' value='actualValue'

          WHEN: WorkContextCondition(key='myKey', operand=EQUALS, value='expectedValue').Evaluate() is called

          THEN: Returns false"
      - description: "PreviousWorkStatusCondition SUCCESS evaluates true when all completed work succeeded"
        type: "unit"
        target_component: "internal/core/condition"
        contracts:
          - "PreviousWorkStatusCondition.Evaluate()"
        given_when_then: "GIVEN: WorkResultTracker with completed work results all having WorkStatus.SUCCESS

          WHEN: PreviousWorkStatusCondition(status=SUCCESS).Evaluate() is called

          THEN: Returns true"
      - description: "PreviousWorkStatusCondition SUCCESS evaluates false when any completed work failed"
        type: "unit"
        target_component: "internal/core/condition"
        contracts:
          - "PreviousWorkStatusCondition.Evaluate()"
        given_when_then: "GIVEN: WorkResultTracker with at least one completed work result having WorkStatus.FAILURE

          WHEN: PreviousWorkStatusCondition(status=SUCCESS).Evaluate() is called

          THEN: Returns false"
      - description: "PreviousWorkStatusCondition FAILURE evaluates true when any completed work failed"
        type: "unit"
        target_component: "internal/core/condition"
        contracts:
          - "PreviousWorkStatusCondition.Evaluate()"
        given_when_then: "GIVEN: WorkResultTracker with at least one completed work result having WorkStatus.FAILURE

          WHEN: PreviousWorkStatusCondition(status=FAILURE).Evaluate() is called

          THEN: Returns true"
      - description: "PreviousWorkStatusCondition ANY always evaluates true"
        type: "unit"
        target_component: "internal/core/condition"
        contracts:
          - "PreviousWorkStatusCondition.Evaluate()"
        given_when_then: "GIVEN: Any WorkResultTracker state

          WHEN: PreviousWorkStatusCondition(status=ANY).Evaluate() is called

          THEN: Returns true"
      - description: "AndCondition evaluates true when both left and right conditions are true"
        type: "unit"
        target_component: "internal/core/condition"
        contracts:
          - "AndCondition.Evaluate()"
        given_when_then: "GIVEN: AndCondition with left condition evaluating true and right condition evaluating true

          WHEN: Evaluate() is called

          THEN: Returns true"
      - description: "AndCondition evaluates false when left condition is false"
        type: "unit"
        target_component: "internal/core/condition"
        contracts:
          - "AndCondition.Evaluate()"
        given_when_then: "GIVEN: AndCondition with left condition evaluating false

          WHEN: Evaluate() is called

          THEN: Returns false"
      - description: "OrCondition evaluates true when either left or right condition is true"
        type: "unit"
        target_component: "internal/core/condition"
        contracts:
          - "OrCondition.Evaluate()"
        given_when_then: "GIVEN: OrCondition with left condition evaluating false and right condition evaluating true

          WHEN: Evaluate() is called

          THEN: Returns true"
      - description: "OrCondition evaluates false when both conditions are false"
        type: "unit"
        target_component: "internal/core/condition"
        contracts:
          - "OrCondition.Evaluate()"
        given_when_then: "GIVEN: OrCondition with both left and right conditions evaluating false

          WHEN: Evaluate() is called

          THEN: Returns false"
      - description: "NotCondition evaluates true when inner condition is false"
        type: "unit"
        target_component: "internal/core/condition"
        contracts:
          - "NotCondition.Evaluate()"
        given_when_then: "GIVEN: NotCondition with inner condition evaluating false

          WHEN: Evaluate() is called

          THEN: Returns true"
      - description: "Complex nested condition evaluates correctly (AND of NOT of OR)"
        type: "unit"
        target_component: "internal/core/condition"
        contracts:
          - "AndCondition.Evaluate()"
          - "NotCondition.Evaluate()"
          - "OrCondition.Evaluate()"
          - "WorkContextCondition.Evaluate()"
        given_when_then: "GIVEN: Complex condition: AND(WorkContextCondition(key='k', value='v'), NOT(OR(WorkContextCondition('missing1', ''), WorkContextCondition('missing2', ''))))

          WHEN: Evaluate() is called with WorkContext containing k='v'

          THEN: Returns true (first condition true, second condition NOT(OR(false, false)) = true)"
      - description: "Conditions FromProtobuf correctly maps all protobuf condition types"
        type: "unit"
        target_component: "internal/core/condition"
        contracts:
          - "Conditions.FromProtobuf()"
        given_when_then: "GIVEN: Protobuf Condition messages for AndCondition, OrCondition, NotCondition, WorkContextCondition, PreviousWorkStatusCondition

          WHEN: FromProtobuf() is called for each type

          THEN: Correct Go condition type is returned with all fields correctly mapped"
      - description: "YeetcdConfig Load parses valid yeetcd.yaml file"
        type: "unit"
        target_component: "pkg/config"
        contracts:
          - "YeetcdConfig.Load()"
          - "YeetcdConfig struct"
        given_when_then: "GIVEN: Valid yeetcd.yaml file with name, language=JAVA, buildImage, buildCmd, and artifacts

          WHEN: Load() is called with the file path

          THEN: YeetcdConfig struct is returned with all fields correctly parsed"
      - description: "YeetcdConfig Load fails for invalid language value"
        type: "unit"
        target_component: "pkg/config"
        contracts:
          - "YeetcdConfig.Load()"
          - "Language enum"
        given_when_then: "GIVEN: yeetcd.yaml file with language='INVALID'

          WHEN: Load() is called

          THEN: Error is returned indicating invalid language value"
      - description: "YeetcdConfig Load parses artifacts array correctly"
        type: "unit"
        target_component: "pkg/config"
        contracts:
          - "YeetcdConfig.Load()"
          - "ArtifactDefinition struct"
        given_when_then: "GIVEN: yeetcd.yaml with multiple artifacts each having name and path

          WHEN: Load() is called

          THEN: Artifacts slice contains all artifacts with correct name and path values"
