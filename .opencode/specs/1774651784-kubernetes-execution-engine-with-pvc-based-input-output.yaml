# Spec (updated)
# Updated: 2026-03-27T23:27:05.927Z

version: 2
problem_statement: "The KubernetesExecutionEngine exists but is incomplete - tests are disabled and it lacks support for input/output files. The current implementation cannot mount host directories into pods (since controller runs in Kubernetes) and has no mechanism for file transfer between work items. Additionally, the test infrastructure relies on bash scripts (local-k8s.sh) which should be replaced with Java-based test utilities."
goals:
  - "Enable KubernetesExecutionEngine tests by implementing missing functionality"
  - "Support input/output files using in-cluster storage (k8s-csi-s3 + RustFS with shared PVC per pipeline)"
  - "Replace bash-based test infrastructure with Java test utilities"
  - "Implement removeImage() functionality for cleanup"
  - "Ensure tests are developer-friendly: create cluster if missing, clean up only test resources, auto-fix bad state"
constraints:
  - "Controller runs inside Kubernetes (not outside)"
  - "Use RustFS (Apache 2.0 license) as in-cluster S3-compatible object store"
  - "Use k8s-csi-s3 (Apache 2.0 license) CSI driver to expose S3 buckets as PVCs"
  - "Single tenant initially (multi-tenancy deferred)"
  - "Tests must pass the 5 tests in AbstractExecutionEngineTest"
  - "Remove local-k8s.sh bash scripts entirely"
  - "Shared PVC per pipeline - each work item writes to its own subdirectory"
  - "GeeseFS (used by k8s-csi-s3) supports ReadWriteMany for concurrent pod access"
tech_choices:
  - area: "Object Storage"
    choice: "RustFS"
    rationale: "Apache 2.0 license (permissive), simple Helm deployment, S3-compatible API, lightweight (1 pod in standalone mode)"
  - area: "CSI Driver"
    choice: "k8s-csi-s3"
    rationale: "Apache 2.0 license, exposes S3 buckets as PVCs using GeeseFS, supports ReadWriteMany (RWX) for concurrent pod access"
  - area: "Storage Architecture"
    choice: "Shared PVC per pipeline"
    rationale: "One PVC per pipeline, each work item writes to its own subdirectory (e.g., /mnt/pvc/outputs/work-a/), multiple pods can mount same PVC simultaneously, no file copying needed between work items"
  - area: "Test Infrastructure"
    choice: "Java-based with k3d"
    rationale: "Eliminates bash script dependency, better IDE integration, automatic cleanup of stale resources"
  - area: "Test Verification"
    choice: "S3 API directly"
    rationale: "Tests use S3 API to read RustFS and verify outputs - simpler and faster than mounting PVCs in test pods"
architecture:
  description: "The controller runs as a pod in Kubernetes. RustFS provides in-cluster S3-compatible storage. k8s-csi-s3 CSI driver exposes RustFS buckets as PVCs. Each pipeline gets a shared PVC - work items mount this PVC and write to their own subdirectories. Work B can read Work A's outputs directly from the shared PVC path. Tests use k3d for local Kubernetes, verify outputs via S3 API directly."
  components:
    - name: "RustFS Helm Chart"
      responsibility: "Provides in-cluster S3-compatible object storage"
      interfaces:
        - "S3 API endpoint"
        - "Helm values for configuration"
    - name: "k8s-csi-s3 Helm Chart"
      responsibility: "CSI driver that exposes S3 buckets as Kubernetes PVCs"
      interfaces:
        - "CSI provisioner"
        - "StorageClass for S3-backed PVCs"
    - name: "PipelinePvcManager"
      responsibility: "Creates/deletes PVCs for each pipeline run"
      interfaces:
        - "createPvc(pipelineRunId) -> pvcName"
        - "deletePvc(pvcName)"
    - name: "KubernetesExecutionEngine"
      responsibility: "Executes work items in Kubernetes pods, mounts shared PVC for input/output"
      interfaces:
        - "execute(work) -> result"
        - "removeImage(imageId)"
        - "configurePodWithPvc(podSpec, pvcName, workId)"
    - name: "TestInfrastructure"
      responsibility: "Manages k3d cluster lifecycle, test resource cleanup, stale resource detection"
      interfaces:
        - "ensureClusterExists()"
        - "cleanupTestResources()"
        - "cleanupStaleResources()"
test_strategy:
  approach: "Integration tests against real k3d cluster. Tests inherit from AbstractExecutionEngineTest which provides 5 core test cases. Tests verify outputs via S3 API directly (reading from RustFS). Additional tests for PVC lifecycle and cleanup logic."
  test_patterns:
    - language: "java"
      pattern: "*Test.java"
    - language: "java"
      pattern: "*IT.java"
phases:
  - name: "Phase 1: Helm Dependencies (RustFS + k8s-csi-s3)"
    description: "Add RustFS and k8s-csi-s3 as Helm dependencies to the yeetcd chart. Configure RustFS for standalone mode (1 pod). Configure k8s-csi-s3 StorageClass to use RustFS as the S3 backend. This phase is a release boundary because subsequent phases require these components to be deployed in the cluster before the controller can use PVC-based storage."
    status: "in_progress"
    is_release_boundary: true
    file_changes:
      - path: "helm/Chart.yaml"
        action: "modify"
        description: "Add dependencies section with RustFS (rustfs from https://charts.rustfs.com/) and k8s-csi-s3 (csi-s3 from https://yandex-cloud.github.io/k8s-csi-s3/charts) Helm charts"
        is_test: false
      - path: "helm/values.yaml"
        action: "modify"
        description: "Add RustFS configuration (standalone mode, credentials rustfsadmin/rustfsadmin, persistence 10Gi) and k8s-csi-s3 configuration (StorageClass named yeetcd-s3 with geesefs mounter, Secret pointing to RustFS endpoint http://rustfs:9000 with same credentials)"
        is_test: false
    test_cases:
      - description: "Deploy Helm chart to test cluster and verify RustFS pod is Running and k8s-csi-s3 CSI driver pods (controller, node, provisioner) are Running"
        type: "integration"
        target_component: "helm/Chart.yaml"
      - description: "Connect to RustFS S3 API endpoint (http://rustfs:9000), create a bucket, write an object, read it back, and delete it to verify S3 compatibility"
        type: "integration"
        target_component: "RustFS Helm chart"
      - description: "Create a PVC using the yeetcd-s3 StorageClass, verify it binds, create a pod that mounts it, write a file, and verify it persists after pod restart"
        type: "integration"
        target_component: "k8s-csi-s3 Helm chart"
  - name: "Phase 2: Test Infrastructure"
    description: "Create Java-based test infrastructure for k3d cluster management. Implement: (1) Cluster existence check and creation if missing, (2) Test resource cleanup (jobs/pods only, not cluster), (3) Stale resource cleanup from failed test runs, (4) Bad state detection and auto-fix. Remove local-k8s.sh bash scripts entirely."
    status: "pending"
    is_release_boundary: false
    file_changes:
      - path: "controller/src/test/java/yeetcd/controller/testinfra/K3dClusterManager.java"
        action: "create"
        description: "Manages k3d cluster lifecycle using ProcessBuilder to execute k3d CLI commands. Methods: clusterExists() runs 'k3d cluster list' and checks if 'yeetcd' cluster exists; createCluster() runs 'k3d cluster create yeetcd --registry-create yeetcd-registry --agents 1'; getRegistryPort() runs 'docker inspect yeetcd-registry' and parses port from JSON output; getKubeconfig() runs 'k3d kubeconfig get yeetcd' and returns kubeconfig content; deleteCluster() runs 'k3d cluster delete yeetcd'."
        is_test: false
      - path: "controller/src/test/java/yeetcd/controller/testinfra/HelmDeployer.java"
        action: "create"
        description: "Deploys Helm charts using ProcessBuilder to execute helm CLI commands. Methods: dependencyUpdate() runs 'helm dependency update ./helm' to download RustFS and k8s-csi-s3 charts (from Phase 1); install() runs 'helm upgrade --install --reset-values --set local=true yeetcd ./helm'; uninstall() runs 'helm uninstall yeetcd'. Includes waitForPodsReady() method that uses Kubernetes Java client to wait for RustFS and k8s-csi-s3 pods to be Running."
        is_test: false
      - path: "controller/src/test/java/yeetcd/controller/testinfra/TestConfigGenerator.java"
        action: "create"
        description: "Generates test configuration files for KubernetesExecutionEngineTest. Methods: generateKubeconfig(File targetFile) writes kubeconfig content to target file; generateControllerConfig(File targetFile, int registryPort) writes yeetcd-controller.yaml with registry.pushAddress=localhost:<port> and registry.pullAddress=yeetcd-registry:5000. Files are written to controller/src/test/resources/ directory."
        is_test: false
      - path: "controller/src/test/java/yeetcd/controller/testinfra/TestResourceCleaner.java"
        action: "create"
        description: "Cleans up Kubernetes resources created during tests using Kubernetes Java client. Methods: cleanupJobs(BatchV1Api batchApi) deletes all jobs in yeetcd namespace; cleanupPods(CoreV1Api coreApi) deletes all pods in yeetcd namespace; cleanupStaleResources(BatchV1Api batchApi, CoreV1Api coreApi) cleans up resources older than 1 hour from failed test runs. Uses label selector to identify test resources."
        is_test: false
      - path: "controller/src/test/java/yeetcd/controller/testinfra/KubernetesTestExtension.java"
        action: "create"
        description: "JUnit 5 extension implementing BeforeAllCallback, AfterEachCallback, AfterAllCallback. BeforeAll: ensures k3d cluster exists (creates if missing), deploys Helm chart with RustFS and k8s-csi-s3, generates config files (kubeconfig, yeetcd-controller.yaml). AfterEach: cleans up jobs and pods from current test using TestResourceCleaner. AfterAll: cleans up stale resources from failed runs. Stores ApiClient in ExtensionContext.Store for test access."
        is_test: false
      - path: "controller/src/test/java/yeetcd/controller/testinfra/S3TestClient.java"
        action: "create"
        description: "S3 client for verifying outputs via RustFS using AWS SDK S3 client. Constructor S3TestClient(String endpoint, String accessKey, String secretKey) creates S3Client with endpoint override and credentials. Methods: createBucket(String bucketName) creates a bucket; putObject(String bucketName, String key, String content) puts an object; getObject(String bucketName, String key) returns object content as String; deleteBucket(String bucketName) deletes bucket and all objects. Uses default RustFS credentials (rustfsadmin/rustfsadmin)."
        is_test: false
      - path: "controller/src/test/java/yeetcd/controller/execution/KubernetesExecutionEngineTest.java"
        action: "modify"
        description: "Remove @Disabled annotation to enable tests. Add @ExtendWith(KubernetesTestExtension.class) annotation to use test infrastructure. No other changes needed - test methods inherit from AbstractExecutionEngineTest (shouldRunAJob, shouldMakeEnvironmentVariablesAvailable, shouldMakeInputFilesAvailable, shouldExtractOutputFiles, shouldBuildAndRunAJavaImage)."
        is_test: true
      - path: "local-k8s.sh"
        action: "delete"
        description: "Remove the bash script entirely as it's replaced by Java test infrastructure (K3dClusterManager, HelmDeployer, TestConfigGenerator, KubernetesTestExtension)."
        is_test: false
      - path: "controller/pom.xml"
        action: "modify"
        description: "Add AWS SDK S3 dependency for S3TestClient: software.amazon.awssdk:s3:2.29.0 with test scope. This enables S3 API access to RustFS for test verification."
        is_test: false
    test_cases:
      - description: "Deploy Helm chart to k3d test cluster using HelmDeployer.dependencyUpdate() and HelmDeployer.install(). Verify RustFS pod (rustfs-0) is Running in yeetcd namespace using Kubernetes Java client. Verify k8s-csi-s3 CSI driver pods (csi-s3-controller-*, csi-s3-node-*, csi-s3-provisioner-*) are Running. Use CoreV1Api.listNamespacedPod() to verify pod status."
        type: "integration"
        target_component: "HelmDeployer.java, K3dClusterManager.java"
      - description: "Connect to RustFS S3 API endpoint (http://localhost:9000 via port-forward or http://rustfs:9000 from in-cluster) using S3TestClient with credentials rustfsadmin/rustfsadmin. Create bucket 'test-bucket', write object 'test-object' with content 'test-content', read back using getObject() and verify content matches, delete object and bucket to verify S3 compatibility."
        type: "integration"
        target_component: "S3TestClient.java"
      - description: "Create PVC using yeetcd-s3 StorageClass (from Phase 1) in yeetcd namespace with 1Gi storage using CoreV1Api.createNamespacedPersistentVolumeClaim(). Wait for PVC to bind using watch mechanism. Create pod mounting PVC at /mnt/data, write file /mnt/data/test.txt with content 'persistence-test'. Delete pod, create new pod mounting same PVC, verify file exists with correct content. Clean up PVC and pods using TestResourceCleaner."
        type: "integration"
        target_component: "TestResourceCleaner.java, KubernetesTestExtension.java"
      - description: "KubernetesExecutionEngineTest passes all 5 tests from AbstractExecutionEngineTest: shouldRunAJob (runs echo command and verifies stdout), shouldMakeEnvironmentVariablesAvailable (verifies env vars are passed to pod), shouldMakeInputFilesAvailable (mounts host directory and reads file), shouldExtractOutputFiles (copies output files from pod), shouldBuildAndRunAJavaImage (builds custom Java image and runs it). Tests are enabled by KubernetesTestExtension which sets up cluster and config."
        type: "integration"
        target_component: "KubernetesExecutionEngineTest.java, KubernetesTestExtension.java"
      - description: "TestResourceCleaner cleans up jobs and pods after test execution. Create test jobs using BatchV1Api.createNamespacedJob() and pods using CoreV1Api.createNamespacedPod() in yeetcd namespace. Run TestResourceCleaner.cleanupJobs() and verify jobs are deleted. Run TestResourceCleaner.cleanupPods() and verify pods are deleted. Verify cleanupStaleResources() deletes resources older than 1 hour."
        type: "integration"
        target_component: "TestResourceCleaner.java"
      - description: "KubernetesTestExtension creates k3d cluster if missing (verify clusterExists() returns false, then createCluster() creates it), deploys Helm chart (verify HelmDeployer.install() succeeds), generates config files (verify kubeconfig and yeetcd-controller.yaml exist in test resources), cleans up resources after each test (verify jobs/pods are deleted after test). Extension is tested by running KubernetesExecutionEngineTest which uses the extension."
        type: "integration"
        target_component: "KubernetesTestExtension.java"
  - name: "Phase 3: KubernetesExecutionEngine PVC Support"
    description: "Implement input/output file handling in KubernetesExecutionEngine using shared PVC per pipeline. Add PipelinePvcManager component for PVC lifecycle. Update work pod configuration to mount shared PVC with work-specific subdirectories. Implement removeImage() for cleanup. Enable the 5 tests in AbstractExecutionEngineTest."
    status: "pending"
    is_release_boundary: false
    file_changes:
      - action: "create"
        description: "Manages PVC lifecycle for pipeline runs. Constructor takes CoreV1Api and namespace. createPvc(String pipelineRunId) creates a V1PersistentVolumeClaim with metadata.name=pipelineRunId, spec.storageClassName='yeetcd-s3', spec.accessModes=['ReadWriteMany'], spec.resources.requests.storage='1Gi'. Returns the PVC name. deletePvc(String pvcName) deletes the PVC using CoreV1Api.deleteNamespacedPersistentVolumeClaim(). waitForPvcBound(String pvcName) polls until PVC status.phase is 'Bound' with timeout."
        is_test: false
        path: "controller/src/main/java/yeetcd/controller/execution/PipelinePvcManager.java"
      - action: "modify"
        description: "Add CoreV1Api field (reuse single instance, remove inline CoreV1Api creation in listJobPodsSync()). Add PipelinePvcManager field. Add private static method sanitizePathForSubPath(String path) that converts mount paths to valid subPath strings (remove leading/trailing slashes, replace remaining '/' with '-'). Modify constructor to accept ApiClient and create CoreV1Api (single instance reused throughout) and PipelinePvcManager. In runJob(): (1) Generate unique PVC name using job name, (2) Create PVC using PipelinePvcManager.createPvc() and wait for Bound, (3) Use try-finally to ensure PVC is deleted even if job fails, (4) Inside try: modify runJobSync() to add V1Volume for PVC (name='pvc', persistentVolumeClaim.new(pvcName)) and V1VolumeMount for each input path with mountPath and subPath=sanitizePathForSubPath(mountPath), and for each output path with mountPath and subPath=sanitizePathForSubPath(outputPath). Implement removeImage() to delete image from registry using HTTP DELETE to registry API (or leave as no-op). Return JobResult with outputDirectoriesParent=null since output files stay in RustFS. NO uploadToPvc/downloadFromPvc methods - controller never touches files."
        is_test: false
        path: "controller/src/main/java/yeetcd/controller/execution/KubernetesExecutionEngine.java"
      - action: "modify"
        description: "Add Pvc inner class to Kubernetes class with fields: storageClassName (String, default 'yeetcd-s3'), storageSize (String, default '1Gi'). This allows configuration of PVC settings for the KubernetesExecutionEngine. NO transferPodImage field needed since there are no transfer pods."
        is_test: false
        path: "controller/src/main/java/yeetcd/controller/config/Config.java"
      - action: "modify"
        description: "Update generateControllerConfig() to include PVC configuration in the generated yeetcd-controller.yaml: pvc.storageClassName='yeetcd-s3', pvc.storageSize='1Gi'. NO transferPodImage configuration needed."
        is_test: true
        path: "controller/src/test/java/yeetcd/controller/testinfra/TestConfigGenerator.java"
      - action: "modify"
        description: "Remove @Disabled annotation to enable tests. Add @ExtendWith(KubernetesTestExtension.class) annotation to use test infrastructure from Phase 2. Add S3TestClient field (injected from KubernetesTestExtension or created locally with RustFS endpoint http://localhost:9000 and credentials rustfsadmin/rustfsadmin). Add private static method sanitizePathForSubPath(String path) matching KubernetesExecutionEngine logic. Override shouldMakeInputFilesAvailable(): (1) Create input files locally, (2) Use S3TestClient.putObject() to upload input file to RustFS bucket 'yeetcd' at key sanitizePathForSubPath(mountPath) + '/' + filename, (3) Create JobDefinition with inputFilePaths (mount path -> OnDiskMountInput, directory ignored by engine), (4) Run job, (5) Verify stdout contains file contents. Override shouldExtractOutputFiles(): (1) Create input files locally, (2) Upload to RustFS at sanitizePathForSubPath(mountPath) + '/' + filename, (3) Create JobDefinition with inputFilePaths and outputDirectoryPaths, (4) Run job, (5) Use S3TestClient.listObjectsV2() to list objects at prefix sanitizePathForSubPath(outputPath), (6) Download each object using S3TestClient.getObject() and verify contents match expected."
        is_test: true
        path: "controller/src/test/java/yeetcd/controller/execution/KubernetesExecutionEngineTest.java"
    test_cases:
      - description: "KubernetesExecutionEngineTest passes all 5 tests from AbstractExecutionEngineTest: shouldRunAJob (runs echo command and verifies stdout), shouldMakeEnvironmentVariablesAvailable (verifies env vars are passed to pod), shouldMakeInputFilesAvailable (test code uploads input files to RustFS via S3TestClient, work pod mounts PVC and reads files directly from mounted path), shouldExtractOutputFiles (work pod writes directly to PVC-mounted output directory, test code downloads files from RustFS via S3TestClient for verification), shouldBuildAndRunAJavaImage (builds custom Java image, pushes to registry, runs it, calls removeImage). Tests are enabled by PVC support with S3TestClient-based file injection/extraction."
        target_component: "KubernetesExecutionEngine.java, KubernetesExecutionEngineTest.java"
        type: "integration"
      - description: "PipelinePvcManager creates PVC with yeetcd-s3 StorageClass and ReadWriteMany access mode. Verify PVC is created with correct name, storage class 'yeetcd-s3', access mode ReadWriteMany, and size 1Gi using CoreV1Api.readNamespacedPersistentVolumeClaim(). Verify waitForPvcBound() returns when PVC status.phase is 'Bound' (polls with 5-second interval, 60-second timeout)."
        target_component: "PipelinePvcManager.java"
        type: "integration"
      - description: "PipelinePvcManager deletes PVC. Create PVC using createPvc(), then delete using deletePvc(). Verify PVC is deleted by attempting to read it (should throw ApiException with 404). Verify cleanup happens even when exception is thrown during job execution (try-finally pattern in runJob())."
        target_component: "PipelinePvcManager.java"
        type: "integration"
      - description: "CoreV1Api is reused across PipelinePvcManager and KubernetesExecutionEngine. Verify that a single CoreV1Api instance is created in KubernetesExecutionEngine constructor and passed to PipelinePvcManager. Verify listJobPodsSync() uses the shared CoreV1Api instance instead of creating a new one inline (current code has 'new CoreV1Api()' on line 155)."
        target_component: "KubernetesExecutionEngine.java"
        type: "unit"
      - description: "PVC is cleaned up on job failure. Run a job that exits with non-zero code (e.g., 'exit 1'). Verify that the PVC is deleted even though the job failed (try-finally pattern in runJob()). Use CoreV1Api.listNamespacedPersistentVolumeClaim() to verify no PVCs remain after job failure."
        target_component: "KubernetesExecutionEngine.java"
        type: "integration"
