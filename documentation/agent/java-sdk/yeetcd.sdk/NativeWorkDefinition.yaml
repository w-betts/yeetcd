description: "Abstract base class for work definitions that execute native Java code within the pipeline runtime. Generates unique execution IDs based on class name and serialized state. Provides access to work context values via environment variables or system properties."
name: "NativeWorkDefinition"
responsibilities:
  - "Generate unique execution ID from class name and state"
  - "Provide work context value access via environment/system properties"
  - "Implement Runnable interface for execution"
  - "Support JSON serialization for state hashing"
version: 1
dependencies:
