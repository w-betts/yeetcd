  - "JsonAutoDetect"
interfaces:
  - description: "Returns the unique execution ID for this work definition"
    method: "executionId()"
    returns: "String"
    postconditions:
      - "Result is SHA256 hash of class name + serialized state"
      - "Same object state produces same execution ID"
      - "Different object states produce different execution IDs"
    invariants:
      - "Execution ID is deterministic for same state"
  - description: "Returns stream containing this native work definition"
    method: "nativeWorkDefinitions()"
    returns: "Stream<NativeWorkDefinition>"
    postconditions:
      - "Result contains exactly this instance"
  - description: "Retrieves work context value from environment or system properties"
    method: "workContextValue(String key)"
    returns: "String"
    preconditions:
      - "Key must not be null"
    postconditions:
      - "Returns environment variable value if set"
      - "Returns system property if environment not set"
      - "Returns null if neither is set"
    invariants:
      - "Environment variables take precedence over system properties"
contracts:
  - "Execution ID uniquely identifies work definition instance"
  - "State serialization uses JSON with field visibility"
  - "Work context values are read from environment first, then system properties"
