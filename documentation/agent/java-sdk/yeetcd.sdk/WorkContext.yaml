component_type: "class"
description: "Immutable key-value context passed to work items as environment variables. Supports merging of contexts at pipeline and work levels."
name: "WorkContext"
responsibilities:
  - "Store key-value context map"
  - "Merge contexts with work-level taking precedence"
  - "Provide factory methods for creating contexts"
  - "Pass context as environment variables to work"
version: 1
dependencies: []
interfaces:
  - description: "Returns the context map"
    method: "getWorkContextMap()"
    returns: "Map<String, String>"
  - description: "Merges this context into another (this takes precedence)"
    method: "mergeInto(WorkContext workContext)"
    returns: "WorkContext"
  - description: "Creates empty context"
    method: "empty()"
    returns: "WorkContext"
  - description: "Creates context with single key-value pair"
    method: "of(String k1, String v1)"
    returns: "WorkContext"
  - description: "Creates context with two key-value pairs"
    method: "of(String k1, String v1, String k2, String v2)"
    returns: "WorkContext"
  - description: "Creates context with three key-value pairs"
    method: "of(String k1, String v1, String k2, String v2, String k3, String v3)"
    returns: "WorkContext"
  - description: "Creates context from existing map"
    method: "of(Map<String, String> map)"
    returns: "WorkContext"
implementation_notes:
  - "Immutable - uses unmodifiable map"
  - "Work-level context merges into pipeline-level (work values win)"
