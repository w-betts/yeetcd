# Documentation: Pipeline
# Generated: 2026-03-31T20:40:59.490Z

component_type: "class"
description: "Immutable representation of a pipeline definition. Acts as the root container for pipeline configuration including name, parameters, work context, and final work items. Manages a static registry of native work definitions keyed by pipeline name for runtime execution."
name: "Pipeline"
responsibilities:
  - "Hold pipeline configuration (name, parameters, work context, final work)"
  - "Serialize pipeline to protobuf format"
  - "Manage native work definition registry per pipeline"
  - "Provide builder for immutable construction"
  - "Support conversion to Work builder for composition"
version: 1
dependencies:
  - "Work"
  - "Parameters"
  - "WorkContext"
  - "PipelineOuterClass"
  - "NativeWorkDefinition"
interfaces:
  - description: "Returns the pipeline parameters definition"
    method: "getParameters()"
    returns: "Parameters"
    postconditions:
      - "Result is never null (returns empty Parameters if none defined)"
  - description: "Returns the pipeline work context"
    method: "getWorkContext()"
    returns: "WorkContext"
    postconditions:
      - "Result is never null (returns empty WorkContext if none defined)"
  - description: "Returns the final work items that constitute this pipeline"
    method: "getFinalWork()"
    returns: "Work[]"
    postconditions:
      - "Result is never null (returns empty array if no final work)"
  - description: "Creates a Work builder using this pipeline as a compound work definition"
    method: "asWorkBuilder(String description)"
    returns: "Work.Builder"
    preconditions:
      - "Description must not be null or empty"
    postconditions:
      - "Builder is pre-configured with this pipeline's work context"
  - description: "Serializes the pipeline to protobuf format"
    method: "toProtobuf()"
    returns: "PipelineOuterClass.Pipeline"
    postconditions:
      - "Result contains all pipeline configuration"
      - "Result can be deserialized back to equivalent Pipeline"
      - "Serialization includes all work context, parameters, and final work"
  - description: "Executes native work definition by pipeline and task name"
    method: "runNativeWorkDefinition(String pipelineName, String taskName)"
    returns: "void"
    preconditions:
      - "Pipeline must exist in native work registry"
      - "Task name must exist in pipeline's work definitions"
    postconditions:
      - "Native work definition is executed"
    invariants:
      - "Execution is synchronous and runs in current thread"
contracts:
  - "Pipeline name must be unique within project scope"
  - "Pipeline is immutable after construction"
  - "Native work definitions are registered at construction time"
  - "All final work items are serialized in protobuf output"
invariants:
  - "Name field is never null or empty"
  - "Parameters is never null"
  - "WorkContext is never null"
  - "FinalWork array is never null"
  - "Native work registry contains all native work definitions from this pipeline"
implementation_notes:
  - "Uses static ConcurrentHashMap for native work registry (thread-safe)"
  - "Native work definitions are collected recursively from all work items"
  - "Execution ID is hash of class name + serialized state"
