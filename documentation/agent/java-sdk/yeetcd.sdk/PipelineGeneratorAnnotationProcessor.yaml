    method: "process(Set<? extends TypeElement> annotations, RoundEnvironment roundEnv)"
    returns: "boolean"
    preconditions:
      - "Annotations set contains PipelineGenerator annotation"
      - "Round environment provides annotated elements"
    postconditions:
      - "GeneratedPipelineDefinitions class is created"
      - "GeneratedCustomWorkRunner class is created"
      - "Returns true to claim annotation"
    invariants:
      - "Processing is idempotent across multiple rounds"
