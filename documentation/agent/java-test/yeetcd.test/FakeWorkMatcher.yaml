component_type: "class"
description: "Matcher for identifying specific work items during fake pipeline execution. Matches by work instance and/or work context."
name: "FakeWorkMatcher"
responsibilities:
  - "Match work items by instance equality"
  - "Match work items by context equality"
  - "Support partial matching (null means match any)"
  - "Used to specify custom results for specific work"
version: 1
dependencies:
  - "Work"
  - "WorkContext"
interfaces:
  - description: "Checks if work and context match this matcher"
    method: "matches(Work work, WorkContext workContext)"
    returns: "boolean"
  - description: "Creates a builder for FakeWorkMatcher"
    method: "builder()"
    returns: "Builder"
  - description: "Sets work to match"
    method: "work(Work work)"
    returns: "Builder"
  - description: "Sets work context to match"
    method: "workContext(WorkContext workContext)"
    returns: "Builder"
implementation_notes:
  - "Immutable with builder pattern"
  - "Null work or context matches any"
  - "Uses equals() for matching, not =="
