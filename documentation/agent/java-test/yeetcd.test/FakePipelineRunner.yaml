# Documentation: FakePipelineRunner
# Generated: 2026-03-31T20:41:45.097Z

component_type: "class"
description: "In-memory pipeline runner for unit testing pipeline definitions without container execution. Simulates work execution with configurable results and tracks execution stages. Supports work matching for specifying different results per work item."
name: "FakePipelineRunner"
responsibilities:
  - "Execute pipelines in-memory without containers"
  - "Simulate work execution with configurable results"
  - "Track work execution stages"
  - "Evaluate conditions using production logic"
  - "Support work result matching"
  - "Handle all work definition types (containerized, custom, compound, dynamic)"
version: 1
dependencies:
  - "Pipeline"
  - "Work"
  - "WorkContext"
  - "Condition"
  - "FakeWorkResult"
  - "FakeWorkMatcher"
  - "FakePipelineRun"
  - "FakePipelineRunResult"
  - "FakeWorkExecution"
  - "FakeWorkStatus"
  - "FakePipelineStatus"
interfaces:
  - description: "Runs pipeline with configured results"
    method: "run(FakePipelineRun pipelineRun)"
    returns: "FakePipelineRunResult"
    preconditions:
      - "Pipeline run must not be null"
      - "Pipeline must have valid structure"
    postconditions:
      - "All work is executed according to dependencies"
      - "Conditions are evaluated"
      - "Results are determined by matchers or default"
      - "Execution stages are recorded"
      - "Final status is SUCCESS or FAILURE"
    invariants:
      - "Work is executed at most once per run"
contracts:
  - "Work execution respects dependency order"
  - "Conditions are evaluated using same logic as production"
  - "Specified results take precedence over default"
  - "Compound work is recursively executed"
  - "Dynamic work generates and executes new work"
  - "Environment variables and input files are passed between work"
invariants:
  - "WorkKey uniquely identifies work by work + merged context"
  - "Completed work is cached in map"
  - "Execution stages group parallelizable work"
  - "Remaining work set decreases monotonically"
  - "Status is FAILURE if any work fails"
implementation_notes:
  - "Uses WorkKey record for work identification"
  - "Execution loop continues until no remaining work"
  - "Unblocked work is work with all dependencies completed"
  - "envVars() collects from previous work stdout and context"
  - "inputFiles() collects from previous work output paths"
  - "Dynamic work writes files to temp locations for testing"
