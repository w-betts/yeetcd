# Documentation: yeetcd.controller.pipeline
# Generated: 2026-03-31T20:40:47.159Z

component_type: "package"
description: "Core pipeline execution and orchestration classes. Manages the runtime representation of pipelines, work execution, result tracking, and condition evaluation. Bridges the gap between deserialized protobuf definitions and actual container execution."
name: "yeetcd.controller.pipeline"
responsibilities:
  - "Manage runtime Pipeline objects from protobuf"
  - "Execute Work items with dependency resolution"
  - "Track work results via WorkResultTracker"
  - "Deserialize work definitions from protobuf"
  - "Evaluate conditions to determine work execution"
  - "Handle dynamic work generation at runtime"
  - "Emit pipeline and work lifecycle events"
version: 1
dependencies:
  - "yeetcd.controller.execution"
  - "yeetcd.protocol.pipeline"
  - "yeetcd.controller.pipeline.condition"
  - "yeetcd.controller.pipeline.events"
subcomponents:
  - "PipelineController"
  - "Pipeline"
  - "Work"
  - "WorkDefinition"
  - "WorkDefinitions"
  - "WorkResultTracker"
  - "PreviousWork"
  - "WorkContext"
  - "Parameter"
  - "Parameters"
  - "WorkOutputPath"
  - "PipelineResult"
  - "PipelineStatus"
  - "WorkResult"
  - "WorkStatus"
  - "WorkSummary"
  - "PipelineMetadata"
  - "PipelineOutputHandler"
  - "ContainerisedWorkDefinition"
  - "CustomWorkDefinition"
  - "CompoundWorkDefinition"
  - "DynamicWorkGeneratingWorkDefinition"
  - "AbstractNativeWorkDefinition"
  - "Arguments"
  - "Conditions"
contracts:
  - "Work is executed at most once per pipeline run"
  - "Work dependencies are resolved before execution"
  - "Conditions are evaluated before work execution"
  - "Failed work causes dependent work to skip (unless overridden by condition)"
  - "Dynamic work generation produces valid Work protobuf on stdout"
  - "Work results are tracked and accessible to dependent work"
invariants:
  - "WorkResultTracker ensures idempotent work execution"
  - "Work IDs are unique within a pipeline"
  - "Pipeline status reflects aggregate of final work status"
  - "Previous work references are immutable after construction"
