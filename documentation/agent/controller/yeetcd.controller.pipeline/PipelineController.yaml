# Documentation: PipelineController
# Generated: 2026-03-31T20:41:21.923Z

component_type: "class"
description: "Main controller orchestrating pipeline assembly and execution. Manages the complete lifecycle from source extraction through image building, pipeline assembly, and work execution. Uses async CompletableFuture chains for non-blocking operations."
name: "PipelineController"
responsibilities:
  - "Orchestrate pipeline assembly from source code"
  - "Manage source extraction and building"
  - "Build container images with pipeline definitions"
  - "Execute pipelines with work dependency resolution"
  - "Coordinate between execution engine and pipeline components"
version: 1
dependencies:
  - "SourceBuilder"
  - "SourceExtractor"
  - "ExecutionEngine"
  - "ExecutionEngines"
  - "Pipeline"
  - "PipelineResult"
  - "PipelineOutputHandler"
  - "WorkResultTracker"
  - "PipelineOuterClass"
  - "CompletableFutureUtils"
interfaces:
  - description: "Assembles executable pipelines from source"
    method: "assemble(Source source)"
    returns: "CompletableFuture<List<Pipeline>>"
    preconditions:
      - "Source must not be null"
      - "Source must contain valid zip with yeetcd.yaml"
    postconditions:
      - "Result contains list of assembled pipelines"
      - "Pipelines are ready for execution"
      - "All pipeline definitions are deserialized from protobuf"
    invariants:
      - "Assembly is asynchronous and non-blocking"
  - description: "Executes a pipeline with output handling"
    method: "execute(Pipeline pipeline, PipelineOutputHandler pipelineOutputHandler)"
    returns: "CompletableFuture<PipelineResult>"
    preconditions:
      - "Pipeline must not be null"
      - "Output handler must not be null"
    postconditions:
      - "PipelineStarted event is recorded"
      - "All final work items are executed"
      - "Work dependencies are resolved"
      - "PipelineFinished event is recorded"
      - "Result contains work results by work ID"
    invariants:
      - "Execution respects work conditions"
      - "Work is executed at most once per pipeline run"
  - description: "Returns the execution engine"
    method: "getExecutionEngine()"
    returns: "ExecutionEngine"
    postconditions:
      - "Result is the execution engine used by this controller"
contracts:
  - "Assembly extracts source, builds artifacts, creates images, deserializes pipelines"
  - "Execution runs all final work with dependency resolution"
  - "Work results are tracked and aggregated into pipeline result"
  - "Events are emitted for pipeline and work lifecycle"
invariants:
  - "Source extraction uses SHA256 for caching"
  - "Image tags are unique per source and yeetcd definition"
  - "Pipeline assembly is idempotent for same source"
  - "Execution engine is determined at construction time"
implementation_notes:
  - "Uses constructor injection for dependencies"
  - "Assembly uses CompletableFuture composition for async chain"
  - "Image building includes all artifacts from source build"
  - "Pipeline definitions are output by running generated class in container"
  - "Work execution uses WorkResultTracker for idempotency"
