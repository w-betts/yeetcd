component_type: "class"
description: "Builds extracted source code using containerized build environments. Caches build results by source SHA to avoid redundant builds. Executes build commands in containers and captures output artifacts."
name: "SourceBuilder"
responsibilities:
  - "Build source code in containerized environments"
  - "Cache build results by source SHA"
  - "Execute build commands from yeetcd.yaml"
  - "Capture build artifacts to output directories"
  - "Support parallel builds for multiple yeetcd definitions"
version: 1
dependencies:
  - "ExecutionEngine"
  - "SourceExtractionResult"
  - "SourceBuildResult"
  - "JobDefinition"
  - "OnDiskMountInput"
  - "CompletableFutureUtils"
interfaces:
  - description: "Builds all yeetcd definitions from extracted source"
    method: "build(SourceExtractionResult sourceExtractionResult)"
    returns: "CompletableFuture<List<SourceBuildResult>>"
    preconditions:
      - "Source extraction result must not be null"
    postconditions:
      - "Builds are cached by source SHA"
      - "Each yeetcd definition is built in parallel"
      - "Build results contain output directories"
      - "Maven cache is mounted for Java builds"
    invariants:
      - "Cache lookup is atomic via computeIfAbsent"
contracts:
  - "Builds are cached by source SHA256"
  - "Build commands execute in isolated containers"
  - "Source is mounted at /var/yeetcd in container"
  - "Maven cache is mounted at /root/.m2 for Java builds"
  - "Output directories are captured per artifact definition"
  - "Parallel builds for multiple yeetcd definitions"
invariants:
  - "Cache is ConcurrentHashMap (thread-safe)"
  - "Cache key is source.sha256()"
  - "Build containers use image from yeetcd.yaml"
  - "Working directory is relative path within source"
  - "Output paths are workingDir + artifact.path"
implementation_notes:
  - "Uses static ConcurrentHashMap for build cache"
