# Documentation: SourceExtractor
# Generated: 2026-03-29T21:34:51.104Z

component_type: "class"
description: "Extracts source code from zip archives and parses yeetcd.yaml configuration files."
name: "SourceExtractor"
responsibilities:
  - "Extract zip archives to temporary directories"
  - "Parse yeetcd.yaml configuration files"
  - "Collect artifact definitions"
  - "Manage extraction lifecycle"
version: 1
dependencies:
  - "Source"
  - "SourceExtractionResult"
  - "YeetcdDefinition"
  - "ZipExtractor"
implementation_notes:
  - "Creates temporary directories for extraction"
  - "Uses Jackson with YAMLFactory for parsing"
  - "Deletes temp directories on JVM exit"
  - "Handles multiple yeetcd.yaml files in archive"
interfaces:
  - description: "Extracts source and parses configurations"
    method: "extract(Source source)"
    returns: "SourceExtractionResult"
