# Documentation: ExecutionEngine
# Generated: 2026-03-29T21:34:45.699Z

component_type: "class"
description: "Interface defining the contract for execution engines that build images and run jobs in containers."
name: "ExecutionEngine"
responsibilities:
  - "Build container images from definitions"
  - "Remove container images"
  - "Run jobs in containers"
  - "Abstract Docker and Kubernetes implementations"
version: 1
dependencies:
  - "BuildImageDefinition"
  - "BuildImageResult"
  - "JobDefinition"
  - "JobResult"
implementation_notes:
  - "Async interface using CompletableFuture"
  - "Implemented by DockerExecutionEngine and KubernetesExecutionEngine"
  - "BuildImageResult contains image ID for job execution"
  - "JobResult contains exit code and output directories"
interfaces:
  - description: "Builds container image"
    method: "buildImage(BuildImageDefinition buildImageDefinition)"
    returns: "CompletableFuture<BuildImageResult>"
  - description: "Removes container image"
    method: "removeImage(String image)"
    returns: "CompletableFuture<Void>"
  - description: "Runs job in container"
    method: "runJob(JobDefinition jobDefinition)"
    returns: "CompletableFuture<JobResult>"
