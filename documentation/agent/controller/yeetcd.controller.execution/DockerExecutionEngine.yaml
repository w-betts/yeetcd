# Documentation: DockerExecutionEngine
# Generated: 2026-03-31T20:41:33.430Z

component_type: "class"
description: "Docker-based execution engine implementation. Builds container images using Docker daemon and executes jobs in Docker containers. Handles image pulling, container creation, execution, log streaming, and output extraction."
name: "DockerExecutionEngine"
responsibilities:
  - "Build container images using Docker daemon"
  - "Execute jobs in Docker containers"
  - "Pull images on demand"
  - "Stream container logs"
  - "Extract output directories from containers"
  - "Clean up containers after execution"
version: 1
dependencies:
  - "AbstractExecutionEngine"
  - "DockerClient"
  - "BuildImageDefinition"
  - "BuildImageResult"
  - "JobDefinition"
  - "JobResult"
  - "JobStreams"
  - "TarArchiveInputStream"
interfaces:
  - description: "Builds container image from definition"
    method: "buildImage(BuildImageDefinition buildImageDefinition)"
    returns: "CompletableFuture<BuildImageResult>"
    preconditions:
      - "Definition must have valid image base"
      - "Artifact directory must exist"
    postconditions:
      - "Image is built with specified tags"
      - "Result contains image ID"
    invariants:
      - "Build is asynchronous"
  - description: "Removes image from Docker"
    method: "removeImage(String image)"
    returns: "CompletableFuture<Void>"
    postconditions:
      - "Image is removed if exists"
      - "Future completes successfully or with error"
  - description: "Runs job in Docker container"
    method: "runJob(JobDefinition jobDefinition)"
    returns: "CompletableFuture<JobResult>"
    preconditions:
      - "Image must exist or be pullable"
      - "Job definition must be valid"
    postconditions:
      - "Container is created and started"
      - "Logs are streamed"
      - "Exit code is captured"
      - "Output directories are extracted if exit code 0"
      - "Container is removed"
    invariants:
      - "Container cleanup happens in finally block"
contracts:
  - "Images are pulled automatically if not present"
  - "Containers are always removed after execution"
  - "Output directories extracted only on success (exit code 0)"
  - "Log streaming captures stdout and stderr"
  - "Image building creates Dockerfile dynamically"
invariants:
  - "Docker client is initialized in constructor"
  - "Container lifecycle: create -> start -> wait -> logs -> remove"
  - "Output extraction uses tar archive from container"
  - "Image tags use format name:tag from definition"
implementation_notes:
  - "Uses docker-java client library"
  - "Dockerfile is generated in artifact directory"
  - "Output extraction uses docker copyArchiveFromContainer"
  - "Log streaming uses ResultCallback with Frame processing"
  - "Image building uses BuildImageResultCallback for async completion"
